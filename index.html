<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seed</title>
<meta name="theme-color" content="#FAFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Seed">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #FAFAF7;
  --bg2: #F3F1EA;
  --card: #FFFFFF;
  --card2: #F7F5EE;
  --border: #E8E4D8;
  --ink: #1A1208;
  --ink2: #4A3F2A;
  --ink3: #9A8E78;
  --gold: #C49A2A;
  --gold-bg: #FBF3DC;
  --gold-border: #E8D48A;
  --accent: #C49A2A;
  --red: #A03020;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
}
.dark {
  --bg: #100E08;
  --bg2: #1A1610;
  --card: #1E1A12;
  --card2: #252018;
  --border: #302A1E;
  --ink: #F0EAD8;
  --ink2: #C8B890;
  --ink3: #7A6E58;
  --gold: #D4A830;
  --gold-bg: #2A2010;
  --gold-border: #4A3A18;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  min-height:100dvh;
  transition:background 0.25s,color 0.25s;
  overscroll-behavior:none;
}

/* ── APP SHELL ── */
.app-shell { display:flex; flex-direction:column; min-height:100vh; min-height:100dvh; max-width:480px; margin:0 auto; position:relative; }

/* ── HEADER ── */
.app-header {
  position:sticky; top:0; z-index:50;
  background:var(--bg);
  padding: 0 1.25rem;
  height:var(--header-h);
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.header-logo {
  font-family:'Lora',serif;
  font-size:1.5rem; font-weight:700;
  color:var(--gold);
  letter-spacing:0.02em;
  font-style:italic;
}
.header-logo span { color:var(--red); font-style:normal; }
.header-right { display:flex; align-items:center; gap:0.5rem; }
.hbtn {
  background:var(--card2); border:1px solid var(--border);
  border-radius:50%; width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1rem;
  transition:background 0.15s, border-color 0.15s;
  color:var(--ink2);
}
.hbtn:hover, .hbtn.active { background:var(--gold-bg); border-color:var(--gold-border); color:var(--gold); }
.logout-btn {
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:0.3rem 0.85rem;
  font-family:'Inter',sans-serif; font-size:0.75rem; font-weight:600;
  color:var(--ink2); cursor:pointer;
  transition:background 0.15s, color 0.15s;
}
.logout-btn:hover { background:var(--red); color:#fff; border-color:var(--red); }
.user-pill {
  font-size:0.72rem; font-weight:600; color:var(--ink3);
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:0.25rem 0.7rem;
  max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* ── SEARCH BAR ── */
.search-wrap {
  margin: 0.75rem 1.25rem 0;
  position:relative;
}
.search-wrap input {
  width:100%; background:var(--card);
  border:1.5px solid var(--border); border-radius:50px;
  padding:0.65rem 1rem 0.65rem 2.6rem;
  font-family:'Inter',sans-serif; font-size:0.9rem;
  color:var(--ink); outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
  box-shadow:var(--shadow-sm);
}
.search-wrap input::placeholder { color:var(--ink3); }
.search-wrap input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(196,154,42,0.12); }
.search-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--ink3); font-size:0.95rem; pointer-events:none; }

/* ── SCROLL AREA ── */
.scroll-area { flex:1; overflow-y:auto; padding:1.25rem 1.25rem calc(56px + env(safe-area-inset-bottom) + 1rem); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex; align-items:stretch; justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:50;
  box-shadow:0 -4px 20px rgba(0,0,0,0.06);
  height:calc(56px + env(safe-area-inset-bottom));
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0.22rem; cursor:pointer; padding:0.5rem 0;
  border:none; background:none; color:var(--ink3);
  font-family:'Inter',sans-serif; font-size:0.6rem; font-weight:500;
  letter-spacing:0.02em; transition:color 0.15s;
  position:relative; overflow:hidden;
}
.nav-item.active { color:var(--gold); }
.nav-item.active::after {
  content:''; position:absolute; top:0; left:20%; right:20%;
  height:2.5px; background:var(--gold); border-radius:0 0 3px 3px;
}
.nav-icon {
  font-size:1.2rem; line-height:1;
  transition:transform 0.2s;
}
.nav-item.active .nav-icon { transform:scale(1.15); }
.nav-label { line-height:1; }
.nav-item.center-btn {
  background:var(--gold); color:#fff !important;
  border-radius:50%; width:48px; height:48px; flex:none;
  align-self:center;
  margin-bottom:calc(env(safe-area-inset-bottom) * 0.5);
  box-shadow:0 4px 16px rgba(196,154,42,0.5);
  font-size:0; padding:0; gap:0;
  overflow:visible;
}
.nav-item.center-btn::after { display:none; }
.nav-item.center-btn .nav-icon { font-size:1.4rem; color:#fff; transform:none; }
.nav-item.center-btn:hover { filter:brightness(1.1); }

/* ── FILTER DROPDOWNS ── */
.filter-row { display:flex; gap:0.6rem; margin-bottom:1.1rem; flex-wrap:wrap; }
.filter-pill {
  display:flex; align-items:center; gap:0.4rem;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:50px; padding:0.4rem 0.9rem;
  font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:500;
  color:var(--ink2); cursor:pointer;
  box-shadow:var(--shadow-sm);
  transition:border-color 0.15s, background 0.15s;
  position:relative;
}
.filter-pill.has-filter { border-color:var(--gold); background:var(--gold-bg); color:var(--gold); font-weight:600; }
.filter-pill select {
  position:absolute; inset:0; opacity:0; cursor:pointer;
  width:100%; border:none; background:none;
  font-size:1rem;
}
.filter-arrow { font-size:0.65rem; opacity:0.6; }

/* ── PAGE TITLE ── */
.page-title { font-family:'Lora',serif; font-size:1.5rem; font-weight:700; color:var(--ink); margin-bottom:0.25rem; }
.page-sub { font-size:0.8rem; color:var(--ink3); margin-bottom:1.25rem; }

/* ── DAILY CARD ── */
.daily-greeting { margin-bottom:1.5rem; }
.daily-greeting .greeting-label {
  font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--ink3); margin-bottom:0.2rem;
}
.daily-greeting .greeting-date { font-family:'Lora',serif; font-size:1.3rem; font-weight:600; color:var(--ink); }

.verse-hero {
  background:linear-gradient(145deg, #FBF5E0 0%, #F0E8C8 60%, #EAE0B8 100%);
  border:1px solid var(--gold-border);
  border-radius:var(--radius-lg);
  padding:2rem 1.75rem 1.75rem;
  box-shadow:var(--shadow-lg);
  position:relative; overflow:hidden;
  margin-bottom:1rem;
}
.dark .verse-hero { background:linear-gradient(145deg,#2A2210 0%,#221A08 100%); }
.verse-hero::before {
  content:''; position:absolute; top:-30px; right:-30px;
  width:120px; height:120px;
  background:radial-gradient(circle, rgba(196,154,42,0.12) 0%, transparent 70%);
  border-radius:50%;
}
.vh-cat {
  display:inline-flex; align-items:center; gap:0.35rem;
  background:rgba(196,154,42,0.12); border:1px solid var(--gold-border);
  border-radius:20px; padding:0.25rem 0.75rem;
  font-size:0.68rem; font-weight:600; color:var(--gold);
  letter-spacing:0.08em; text-transform:uppercase;
  margin-bottom:1.25rem;
}
.vh-ornament { opacity:0.4; font-size:0.85rem; }
.vh-text {
  font-family:'Lora',serif;
  font-size:1.2rem; line-height:1.75;
  color:var(--ink); font-style:italic; font-weight:400;
  margin-bottom:1.5rem;
}
.vh-footer { display:flex; align-items:center; justify-content:space-between; }
.vh-ref {
  font-size:0.78rem; font-weight:700;
  color:var(--gold); letter-spacing:0.08em; text-transform:uppercase;
}
.fav-circle {
  width:38px; height:38px; border-radius:50%;
  background:var(--card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1.1rem; color:var(--ink3);
  box-shadow:var(--shadow-sm);
  transition:background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
}
.fav-circle:hover { transform:scale(1.1); }
.fav-circle.active { background:rgba(160,48,32,0.08); border-color:rgba(160,48,32,0.2); color:var(--red); }

/* ── QUICK STATS ── */
.quick-stats { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:0.25rem; }
.stat-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:1rem;
  box-shadow:var(--shadow-sm);
}
.stat-num { font-family:'Lora',serif; font-size:1.6rem; font-weight:700; color:var(--gold); line-height:1; margin-bottom:0.25rem; }
.stat-label { font-size:0.72rem; color:var(--ink3); font-weight:500; }

/* ── SECTION HEADER ── */
.sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.85rem; margin-top:1.5rem; }
.sec-title { font-size:0.72rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink3); }

/* ── CATEGORY CHIPS ── */
.chips-scroll { display:flex; gap:0.5rem; overflow-x:auto; scrollbar-width:none; padding-bottom:0.25rem; margin-bottom:1rem; }
.chips-scroll::-webkit-scrollbar { display:none; }
.chip {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:50px; padding:0.4rem 1rem;
  font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:500;
  color:var(--ink2); cursor:pointer; white-space:nowrap;
  transition:all 0.15s; box-shadow:var(--shadow-sm);
}
.chip:hover { border-color:var(--gold-border); color:var(--gold); background:var(--gold-bg); }
.chip.active { background:var(--gold); color:#fff; border-color:var(--gold); box-shadow:0 2px 8px rgba(196,154,42,0.3); }

/* ── VERSE CARDS ── */
.verse-list { display:flex; flex-direction:column; gap:0.75rem; }
.verse-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:1.1rem 1.2rem;
  box-shadow:var(--shadow-sm);
  transition:box-shadow 0.2s, transform 0.15s;
  position:relative;
}
.verse-card:active { transform:scale(0.99); }
.vc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:0.6rem; gap:0.5rem; }
.vc-ref { font-size:0.72rem; font-weight:700; color:var(--gold); letter-spacing:0.06em; text-transform:uppercase; }
.vc-cat { font-size:0.62rem; font-weight:600; background:var(--gold-bg); color:var(--gold); border:1px solid var(--gold-border); border-radius:6px; padding:0.15rem 0.45rem; letter-spacing:0.04em; white-space:nowrap; }
.vc-text { font-family:'Lora',serif; font-size:0.95rem; line-height:1.7; color:var(--ink2); font-style:italic; margin-bottom:0.75rem; }
.vc-bottom { display:flex; justify-content:flex-end; }
.fav-btn {
  background:none; border:none; cursor:pointer;
  color:var(--ink3); font-size:1.1rem; padding:0.2rem;
  transition:color 0.15s, transform 0.1s;
}
.fav-btn:hover { transform:scale(1.2); }
.fav-btn.active { color:var(--red); }

/* ── EMPTY ── */
.empty { text-align:center; padding:3rem 1rem; color:var(--ink3); font-style:italic; font-size:0.95rem; }

/* ── AUTH SCREEN ── */
.auth-wrap { padding:2rem 1.25rem; }
.auth-hero { text-align:center; margin-bottom:2rem; }
.auth-logo { font-family:'Lora',serif; font-size:2.5rem; font-weight:700; color:var(--gold); font-style:italic; margin-bottom:0.5rem; }
.auth-logo span { color:var(--red); font-style:normal; }
.auth-tagline { font-size:0.88rem; color:var(--ink3); line-height:1.5; }
.auth-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.75rem 1.5rem; box-shadow:var(--shadow-md); }
.auth-card-title { font-family:'Lora',serif; font-size:1.2rem; font-weight:700; color:var(--ink); margin-bottom:0.25rem; }
.auth-card-sub { font-size:0.82rem; color:var(--ink3); margin-bottom:1.5rem; }
.auth-field { margin-bottom:1rem; }
.auth-label { display:block; font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); margin-bottom:0.4rem; }
.auth-input {
  width:100%; background:var(--bg2);
  border:1.5px solid var(--border); border-radius:var(--radius-sm);
  padding:0.75rem 1rem; font-family:'Inter',sans-serif; font-size:0.95rem;
  color:var(--ink); outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.auth-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(196,154,42,0.12); }
.auth-btn {
  width:100%; margin-top:0.5rem;
  background:var(--gold); color:#fff; border:none;
  border-radius:50px; padding:0.9rem;
  font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:700;
  cursor:pointer; letter-spacing:0.02em;
  box-shadow:0 4px 16px rgba(196,154,42,0.35);
  transition:filter 0.15s, transform 0.1s;
}
.auth-btn:hover { filter:brightness(1.08); }
.auth-btn:active { transform:scale(0.98); }
.auth-btn:disabled { opacity:0.55; cursor:not-allowed; }
.auth-switch { margin-top:1.25rem; text-align:center; font-size:0.84rem; color:var(--ink3); }
.auth-switch a { color:var(--gold); cursor:pointer; font-weight:600; }
.auth-error { margin-top:0.85rem; padding:0.6rem 0.9rem; background:rgba(160,48,32,0.07); border:1px solid rgba(160,48,32,0.2); border-radius:8px; font-size:0.82rem; color:var(--red); }
.auth-success { margin-top:0.85rem; padding:0.6rem 0.9rem; background:rgba(50,120,50,0.07); border:1px solid rgba(50,120,50,0.2); border-radius:8px; font-size:0.82rem; color:#276027; }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(10,8,4,0.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(3px); }
.modal {
  background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:1.5rem 1.5rem 2.5rem;
  width:100%; max-width:480px;
  box-shadow:var(--shadow-lg);
  max-height:90vh; overflow-y:auto;
}
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 1.25rem; }
.modal-title { font-family:'Lora',serif; font-size:1.15rem; font-weight:700; color:var(--ink); margin-bottom:1.25rem; }
.modal label { display:block; font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); margin-bottom:0.4rem; margin-top:1rem; }
.modal label:first-of-type { margin-top:0; }
.modal input,.modal textarea,.modal select {
  width:100%; background:var(--card2); border:1.5px solid var(--border);
  border-radius:var(--radius-sm); padding:0.7rem 0.9rem;
  font-family:'Inter',sans-serif; font-size:0.9rem; color:var(--ink);
  outline:none; transition:border-color 0.2s; resize:vertical;
}
.modal input:focus,.modal textarea:focus,.modal select:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(196,154,42,0.1); }
.modal textarea { min-height:90px; }
.modal-actions { display:flex; gap:0.75rem; margin-top:1.5rem; }
.btn { font-family:'Inter',sans-serif; font-size:0.88rem; font-weight:600; padding:0.7rem 1.25rem; border-radius:50px; border:none; cursor:pointer; transition:all 0.15s; flex:1; }
.btn-primary { background:var(--gold); color:#fff; box-shadow:0 2px 8px rgba(196,154,42,0.3); }
.btn-primary:hover { filter:brightness(1.08); }
.btn-ghost { background:var(--card2); border:1.5px solid var(--border); color:var(--ink2); }
.btn-ghost:hover { background:var(--bg2); }
.new-cat-row { display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem; }
.new-cat-row input { flex:1; margin:0; }
.new-cat-row .btn { flex:none; padding:0.65rem 1rem; font-size:0.8rem; white-space:nowrap; }

/* ── LOADING ── */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 1rem; gap:1rem; color:var(--ink3); font-size:0.9rem; }
.spinner { width:28px; height:28px; border:2.5px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.65s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(var(--nav-h) + 1rem); left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:var(--bg);
  font-family:'Inter',sans-serif; font-size:0.84rem; font-weight:500;
  padding:0.65rem 1.25rem; border-radius:50px;
  box-shadow:var(--shadow-lg); opacity:0;
  transition:transform 0.25s ease, opacity 0.25s ease;
  z-index:300; white-space:nowrap; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

@media (min-width:481px) {
  .bottom-nav { border-radius:0; }
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- HEADER -->
  <header class="app-header" id="appHeader">
    <div class="header-logo">Seed<span>.</span></div>
    <div class="header-right">
      <button class="hbtn" id="searchToggle" title="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="hbtn" id="darkToggle" title="Toggle mode">
        <svg id="darkIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="lightIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <span class="user-pill" id="userPill" style="display:none;"></span>
      <button class="logout-btn" id="signOutBtn" style="display:none;">Logout</button>
    </div>
  </header>

  <!-- SEARCH -->
  <div id="searchBar" style="display:none;">
    <div class="search-wrap">
      <span class="search-icon">

function getVerses(){return[...BASE_VERSES,...cloudVerses];}

function getDailyVerse(){
  const v=getVerses(); const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  const day=Math.floor((now-start)/86400000);
  return v[((now.getFullYear()*1000)+day)%v.length];
}

async function loadUserData(){
  const [fr,vr,cr]=await Promise.all([
    db.from("favorites").select("verse_ref"),
    db.from("custom_verses").select("*").order("created_at"),
    db.from("custom_categories").select("name").order("created_at"),
  ]);
  cloudFavs=(fr.data||[]).map(r=>r.verse_ref);
  cloudVerses=(vr.data||[]).map(r=>({ref:r.ref,text:r.text,cat:r.cat}));
  cloudCats=(cr.data||[]).map(r=>r.name);
}

async function toggleFav(ref){
  if(isFav(ref)){cloudFavs=cloudFavs.filter(r=>r!==ref);await db.from("favorites").delete().eq("verse_ref",ref).eq("user_id",currentUser.id);showToast("Removed from Saved");}
  else{cloudFavs.push(ref);await db.from("favorites").insert({user_id:currentUser.id,verse_ref:ref});showToast("Saved!");}
  render();
}
async function toggleFlashFav(){const v=getDailyVerse();await toggleFav(v.ref);renderDaily();}

  const v=getDailyVerse();

  const day=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

function renderVerseCard(v){
  const sr=v.ref.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  return`<div class="verse-card"><div class="vc-top"><div class="vc-ref">${sanitize(v.ref)}</div><span class="vc-cat">${sanitize(v.cat)}</span></div><div class="vc-text">"${sanitize(v.text)}"</div><div class="vc-bottom"><button class="fav-btn ${isFav(v.ref)?"active":""}" onclick="toggleFav('${sr}')">${isFav(v.ref)?"&#9829;":"&#9825;"}</button></div></div>`;
}

// Extract book name from verse reference e.g. "Proverbs 10:22" => "Proverbs"
function getBook(ref){ return ref.replace(/\s+\d.*$/,"").trim(); }
function getBooks(){
  const books=[...new Set(getVerses().map(v=>getBook(v.ref)))].sort();
  return["All",...books];
}
function selectCat(val){ selectedCat=val; render(); }
function selectBook(val){ selectedBook=val; render(); }

function filterRowHTML(){
  const cats=["All",...BASE_CATS,...cloudCats];
  const books=getBooks();
  const catActive=selectedCat!=="All";
  const bookActive=selectedBook!=="All";
  return`<div class="filter-row">
    <div class="filter-pill ${catActive?"has-filter":""}">
      &#9965; ${catActive?sanitize(selectedCat):"Category"} <span class="filter-arrow">&#9660;</span>
      <select onchange="selectCat(this.value)">
        ${cats.map(c=>`<option value="${c}" ${selectedCat===c?"selected":""}>${c}</option>`).join("")}
      </select>
    </div>
    <div class="filter-pill ${bookActive?"has-filter":""}">
      &#128214; ${bookActive?sanitize(selectedBook):"Book"} <span class="filter-arrow">&#9660;</span>
      <select onchange="selectBook(this.value)">
        ${books.map(b=>`<option value="${b}" ${selectedBook===b?"selected":""}>${b}</option>`).join("")}
      </select>
    </div>
  </div>`;
}

function getFiltered(){
  let list=getVerses();
  if(currentView==="favorites") list=list.filter(v=>isFav(v.ref));
  if(selectedCat!=="All") list=list.filter(v=>v.cat===selectedCat);
  if(selectedBook!=="All") list=list.filter(v=>getBook(v.ref)===selectedBook);
  if(searchQuery){ const q=searchQuery.toLowerCase(); list=list.filter(v=>v.ref.toLowerCase().includes(q)||v.text.toLowerCase().includes(q)||v.cat.toLowerCase().includes(q)); }
  return list;
}

function render(){
  const main=document.getElementById("mainContent");
  if(!currentUser){renderAuth();return;}
  if(currentView==="daily"){renderDaily();return;}
  const list=getFiltered();
  let html="";
  if(currentView==="browse"){
    html+=`<div class="page-title">Browse</div><div class="page-sub">Filter by category or book</div>`;
    html+=filterRowHTML();
  }
  if(currentView==="all"){
    html+=`<div class="page-title">All Verses</div><div class="page-sub">${list.length} NKJV verses</div>`;
    html+=filterRowHTML();
  }
  if(currentView==="favorites"){
    html+=`<div class="page-title">Saved</div><div class="page-sub">${list.length} verse${list.length!==1?"s":""} saved</div>`;
    html+=filterRowHTML();
  }
  html+=`<div class="sec-header"><span class="sec-title">Results</span><span class="sec-title">${list.length} verse${list.length!==1?"s":""}</span></div>`;
  if(list.length===0){
    html+=currentView==="favorites"?`<div class="empty">Nothing saved yet. Tap &#9825; on any verse to save it here.</div>`:`<div class="empty">No verses found for these filters.</div>`;
  }else{
    html+=`<div class="verse-list">`;list.forEach(v=>{html+=renderVerseCard(v);});html+=`</div>`;
  }
  main.innerHTML=html;
}

function renderAuth(){
  const main=document.getElementById("mainContent");
  const isLogin=authMode==="login";
  main.innerHTML=`
    <div class="auth-wrap">
      <div class="auth-hero">
        <div class="auth-logo">Seed<span>.</span></div>
        <div class="auth-tagline">NKJV verses on financial blessing,<br>provision, and wisdom.</div>
      </div>
      <div class="auth-card">
        <div class="auth-card-title">${isLogin?"Welcome back":"Create account"}</div>
        <div class="auth-card-sub">${isLogin?"Sign in to access your saved verses.":"Sign up to save verses to the cloud."}</div>
        <div class="auth-field">
          <label class="auth-label">Email</label>
          <input class="auth-input" type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label class="auth-label">Password</label>
          <input class="auth-input" type="password" id="authPassword" placeholder="${isLogin?"Your password":"Min. 6 characters"}" autocomplete="${isLogin?"current-password":"new-password"}">
        </div>
        <div id="authMsg"></div>
        <button class="auth-btn" id="authSubmit" onclick="handleAuth()">${isLogin?"Sign In":"Sign Up"}</button>
        <div class="auth-switch">${isLogin?"Don't have an account? <a onclick=\"switchAuth('signup')\">Sign up</a>":"Already have an account? <a onclick=\"switchAuth('login')\">Sign in</a>"}</div>
      </div>
    </div>`;
  setTimeout(()=>{const e=document.getElementById("authEmail");if(e)e.focus();},100);
}

function switchAuth(mode){authMode=mode;render();}

async function handleAuth(){
  const email=document.getElementById("authEmail").value.trim();
  const password=document.getElementById("authPassword").value;
  const btn=document.getElementById("authSubmit");
  const msg=document.getElementById("authMsg");
  if(!email||!password){msg.innerHTML=`<div class="auth-error">Please enter your email and password.</div>`;return;}
  btn.disabled=true;btn.textContent=authMode==="login"?"Signing in...":"Creating account...";msg.innerHTML="";
  const result=authMode==="login"?await db.auth.signInWithPassword({email,password}):await db.auth.signUp({email,password});
  if(result.error){msg.innerHTML=`<div class="auth-error">${result.error.message}</div>`;btn.disabled=false;btn.textContent=authMode==="login"?"Sign In":"Sign Up";}
  else if(authMode==="signup"&&!result.data.session){msg.innerHTML=`<div class="auth-success">Check your email to confirm, then sign in.</div>`;btn.disabled=false;btn.textContent="Sign Up";}
}

async function addCategory(){
  const input=document.getElementById("newCatInput");const name=input.value.trim();
  if(!name)return showToast("Enter a category name.");
  if([...BASE_CATS,...cloudCats].map(c=>c.toLowerCase()).includes(name.toLowerCase()))return showToast("Category already exists.");
  const{error}=await db.from("custom_categories").insert({user_id:currentUser.id,name});
  if(error)return showToast("Error saving category.");
  cloudCats.push(name);input.value="";populateCatSelect();document.getElementById("newCat").value=name;showToast(`"${name}" added.`);

async function saveVerse(){
  const ref=document.getElementById("newRef").value.trim();
  const text=document.getElementById("newText").value.trim();
  const cat=document.getElementById("newCat").value;
  if(!ref)return showToast("Enter a verse reference.");

  if(getVerses().find(v=>v.ref.toLowerCase()===ref.toLowerCase()))return showToast("That reference already exists.");
  const{error}=await db.from("custom_verses").insert({user_id:currentUser.id,ref,text,cat});
  if(error)return showToast("Error saving verse.");
  cloudVerses.push({ref,text,cat});closeModal();showToast(`"${ref}" added.`);render();
}

// Load with a timeout so loading never gets permanently stuck
async function loadUserDataSafe(){
  const timeout=new Promise(resolve=>setTimeout(resolve,6000));
  await Promise.race([loadUserData(),timeout]);
}

// AUTH STATE
db.auth.onAuthStateChange(async(event,session)=>{
  if(event==="SIGNED_OUT"||event==="USER_DELETED"){
    currentUser=null;cloudFavs=[];cloudVerses=[];cloudCats=[];
    document.getElementById("userPill").style.display="none";
    document.getElementById("signOutBtn").style.display="none";
    document.getElementById("addBtn").style.display="none";
    render();return;
  }
  // Fresh login — show loader and fetch data
  if(event==="SIGNED_IN"&&session){
    applyUserUI(session.user);
    document.getElementById("mainContent").innerHTML=`<div class="loading"><div class="spinner"></div><span>Loading your verses...</span></div>`;
    await loadUserDataSafe();
    render();return;
  }
  // App resumed from background — refresh silently, no loader
  if(event==="TOKEN_REFRESHED"&&session){
    applyUserUI(session.user);
    await loadUserDataSafe();
    render();return;
  }
});

// On page load — check session directly, never rely solely on the listener
(async()=>{
  try{
    const{data:{session}}=await db.auth.getSession();
    if(session){
      applyUserUI(session.user);
      document.getElementById("mainContent").innerHTML=`<div class="loading"><div class="spinner"></div><span>Loading your verses...</span></div>`;
      await loadUserDataSafe();
      render();
    }else{
      currentUser=null;render();
    }
  }catch(e){
    currentUser=null;render();
  }
})();
if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(e=>console.log("SW failed",e));});}
</script>
