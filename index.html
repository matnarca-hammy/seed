<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seed — Financial Blessings</title>
<meta name="theme-color" content="#B8860B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Seed">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #F5EDD6;
    --parchment-dark: #EDE0C0;
    --parchment-deeper: #E2D2A8;
    --ink: #2C1F0E;
    --ink-mid: #5C4A2A;
    --ink-light: #9A825A;
    --gold: #B8860B;
    --gold-light: #D4A017;
    --gold-pale: #F0D98A;
    --red-earth: #8B3A2A;
    --surface: #FAF4E4;
    --card: #F0E6C8;
    --border: #D4C49A;
    --shadow: rgba(44,31,14,0.12);
  }
  .dark {
    --parchment: #1A1208;
    --parchment-dark: #221A0A;
    --parchment-deeper: #2C2210;
    --ink: #F0E6C8;
    --ink-mid: #C8B07A;
    --ink-light: #9A825A;
    --gold: #D4A017;
    --gold-light: #E8BC30;
    --gold-pale: #3A2C08;
    --surface: #140E04;
    --card: #221A0A;
    --border: #3A2C10;
    --shadow: rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  header {
    background: var(--parchment-dark);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .logo-seed { font-style: italic; }
  .logo-dot { color: var(--red-earth); font-style: normal; }
  .header-actions { display: flex; align-items: center; gap: 0.75rem; }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-mid);
    padding: 0.4rem;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: var(--parchment-deeper); color: var(--gold); }
  .icon-btn.active { color: var(--gold); }
  nav {
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    padding: 0 1.5rem;
  }
  .tab {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink-light);
    padding: 0.75rem 1rem;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--ink-mid); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .search-bar {
    max-width: 900px;
    margin: 1.25rem auto 0;
    padding: 0 1.5rem;
  }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem 0.7rem 2.75rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input::placeholder { color: var(--ink-light); }
  .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.15); }
  .search-icon {
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    font-size: 1rem;
    pointer-events: none;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 4rem;
  }
  .section-label {
    font-family: 'Lora', serif;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .verse-grid { display: grid; gap: 1rem; }
  .verse-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.4rem;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .verse-card:hover { box-shadow: 0 4px 16px var(--shadow); transform: translateY(-1px); }
  .verse-ref {
    font-family: 'Lora', serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .verse-category-tag {
    font-size: 0.68rem;
    background: var(--parchment-deeper);
    color: var(--ink-mid);
    border-radius: 4px;
    padding: 0.15rem 0.5rem;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .verse-text {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ink);
    font-style: italic;
  }
  .verse-actions {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-light);
    font-size: 1.15rem;
    padding: 0.25rem;
    transition: color 0.15s, transform 0.1s;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .fav-btn.active { color: var(--red-earth); }
  .category-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 0.9rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--ink-mid);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--parchment-deeper); }
  .chip.active { background: var(--gold); color: #fff; border-color: var(--gold); }
  .flashcard-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0.25rem;
  }
  .flashcard-label {
    font-family: 'Lora', serif;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 1.25rem;
    align-self: flex-start;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
    width: 100%;
  }
  .flashcard-wrap {
    width: 100%;
    max-width: 680px;
    cursor: grab;
    user-select: none;
  }
  .flashcard-wrap:active { cursor: grabbing; }
  .flashcard {
    width: 100%;
    background: linear-gradient(150deg, var(--parchment-dark) 0%, var(--gold-pale) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem 2.5rem;
    box-shadow: 0 8px 40px var(--shadow), 0 1px 0 rgba(255,255,255,0.3) inset;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-height: 320px;
    justify-content: center;
    transition: opacity 0.2s;
  }
  .dark .flashcard { background: linear-gradient(150deg, #221A0A 0%, #3A2C08 100%); }
  .flashcard-ornament {
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.35;
    margin-bottom: 1.25rem;
    line-height: 1;
  }
  .flashcard-cat {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.75rem;
  }
  .flashcard-text {
    font-family: 'Lora', serif;
    font-size: 1.45rem;
    line-height: 1.7;
    color: var(--ink);
    font-style: italic;
    font-weight: 400;
    margin-bottom: 1.5rem;
  }
  .flashcard-ref {
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .flashcard-controls {
    margin-top: 1.75rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }
  .fc-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--ink-mid);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, box-shadow 0.15s;
  }
  .fc-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
  .fc-count {
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    color: var(--ink-light);
    min-width: 60px;
    text-align: center;
  }
  .fc-fav {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    color: var(--ink-light);
    transition: color 0.15s, transform 0.1s;
    padding: 0.25rem;
  }
  .fc-fav:hover { transform: scale(1.2); }
  .fc-fav.active { color: var(--red-earth); }
  .swipe-hint {
    font-size: 0.75rem;
    color: var(--ink-light);
    margin-top: 0.75rem;
    font-style: italic;
    letter-spacing: 0.04em;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,31,14,0.55);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 16px 48px var(--shadow);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Lora', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 1.5rem;
  }
  .modal label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.4rem;
    margin-top: 1rem;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea, .modal select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.85rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: vertical;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,134,11,0.15);
  }
  .modal textarea { min-height: 100px; }
  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }
  .btn {
    font-family: 'Source Serif 4', serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-primary { background: var(--gold); color: #fff; }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--ink-mid); }
  .btn-ghost:hover { background: var(--card); }
  .new-cat-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
  .new-cat-row input { flex: 1; margin: 0; }
  .new-cat-row .btn { white-space: nowrap; padding: 0.6rem 0.9rem; font-size: 0.82rem; }
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 1.5rem;
    width: 52px; height: 52px;
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(184,134,11,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s;
    z-index: 150;
  }
  .fab:hover { background: var(--gold-light); transform: scale(1.08); }
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-light);
    font-style: italic;
    font-size: 1rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--parchment);
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    padding: 0.65rem 1.25rem;
    border-radius: 8px;
    box-shadow: 0 4px 16px var(--shadow);
    transition: transform 0.3s ease;
    z-index: 1000;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    .flashcard-text { font-size: 1.15rem; }
    .flashcard { padding: 2.25rem 1.5rem 2rem; min-height: 260px; }
    main { padding: 1.25rem 1rem 4rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span class="logo-seed">Seed</span><span class="logo-dot">.</span></div>
    <div class="header-actions">
      <button class="icon-btn" id="searchToggle" title="Search">&#128269;</button>
      <button class="icon-btn" id="darkToggle" title="Toggle dark mode">&#127768;</button>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="tab active" data-view="daily">Daily Card</button>
    <button class="tab" data-view="browse">Browse</button>
    <button class="tab" data-view="all">All Verses</button>
    <button class="tab" data-view="favorites">Favorites &#9829;</button>
  </div>
</nav>

<div class="search-bar" id="searchBar" style="display:none;">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search by verse, reference, or keyword..." autocomplete="off">
  </div>
</div>

<main id="mainContent"></main>
<button class="fab" id="addBtn" title="Add a verse">&#43;</button>

<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Add a Verse</div>
    <label>Reference (e.g. John 3:16)</label>
    <input type="text" id="newRef" placeholder="Book chapter:verse">
    <label>Verse Text</label>
    <textarea id="newText" placeholder="Type or paste the verse here..."></textarea>
    <label>Category</label>
    <select id="newCat"></select>
    <div style="margin-top:0.75rem;">
      <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:0.4rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;">Or add a new category</div>
      <div class="new-cat-row">
        <input type="text" id="newCatInput" placeholder="New category name...">
        <button class="btn btn-primary" onclick="addCategory()">Add</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveVerse()">Save Verse</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  { ref: "Psalm 23:1", text: "The LORD is my shepherd; I shall not want.", cat: "Provision" },
  { ref: "Isaiah 58:11", text: "The LORD will guide you continually, and satisfy your soul in drought, and strengthen your bones; you shall be like a watered garden, and like a spring of water, whose waters do not fail.", cat: "Provision" },
  { ref: "Matthew 7:11", text: "If you then, being evil, know how to give good gifts to your children, how much more will your Father who is in heaven give good things to those who ask Him!", cat: "Provision" },
  { ref: "Psalm 34:10", text: "The young lions lack and suffer hunger; but those who seek the LORD shall not lack any good thing.", cat: "Provision" },
  { ref: "Deuteronomy 2:7", text: "For the LORD your God has blessed you in all the work of your hand. He knows your trudging through this great wilderness. These forty years the LORD your God has been with you; you have lacked nothing.", cat: "Provision" },
  { ref: "Genesis 22:14", text: "And Abraham called the name of the place, The-LORD-Will-Provide; as it is said to this day, 'In the Mount of the LORD it shall be provided.'", cat: "Provision" },
  { ref: "2 Corinthians 9:10", text: "Now may He who supplies seed to the sower, and bread for food, supply and multiply the seed you have sown and increase the fruits of your righteousness.", cat: "Provision" },
  { ref: "Psalm 37:25", text: "I have been young, and now am old; yet I have not seen the righteous forsaken, nor his descendants begging bread.", cat: "Provision" },
  { ref: "Joshua 1:8", text: "This Book of the Law shall not depart from your mouth, but you shall meditate in it day and night, that you may observe to do according to all that is written in it. For then you will make your way prosperous, and then you will have good success.", cat: "Breakthrough" },
  { ref: "Psalm 5:12", text: "For You, O LORD, will bless the righteous; with favor You will surround him as with a shield.", cat: "Breakthrough" },
  { ref: "Numbers 6:24-26", text: "The LORD bless you and keep you; the LORD make His face shine upon you, and be gracious to you; the LORD lift up His countenance upon you, and give you peace.", cat: "Breakthrough" },
  { ref: "Deuteronomy 28:12", text: "The LORD will open to you His good treasure, the heavens, to give the rain to your land in its season, and to bless all the work of your hand. You shall lend to many nations, but you shall not borrow.", cat: "Breakthrough" },
  { ref: "Isaiah 60:5", text: "Then you shall see and become radiant, and your heart shall swell with joy; because the abundance of the sea shall be turned to you, the wealth of the Gentiles shall come to you.", cat: "Breakthrough" },
  { ref: "Proverbs 13:22", text: "A good man leaves an inheritance to his children's children, but the wealth of the sinner is stored up for the righteous.", cat: "Breakthrough" },
  { ref: "Ecclesiastes 2:26", text: "For God gives wisdom and knowledge and joy to a man who is good in His sight; but to the sinner He gives the work of gathering and collecting, that he may give to him who is good before God.", cat: "Breakthrough" },
  { ref: "Haggai 2:8", text: "'The silver is Mine, and the gold is Mine,' says the LORD of hosts.", cat: "Breakthrough" },
];
const BASE_CATS = ["Prosperity","Tithing & Giving","Wisdom","Provision","Breakthrough"];

let customVerses = JSON.parse(localStorage.getItem("seed_custom_verses")||"[]");
let customCats = JSON.parse(localStorage.getItem("seed_custom_cats")||"[]");
let favorites = JSON.parse(localStorage.getItem("seed_favs")||"[]");
let isDark = localStorage.getItem("seed_dark")==="true";
let searchVisible=false,searchQuery="",selectedCat="All",currentView="daily",flashIndex=0,flashOrder=[];

function getVerses(){return[...BASE_VERSES,...customVerses];}
function getCategories(){return["All",...BASE_CATS,...customCats];}
if(isDark)document.body.classList.add("dark");

function saveCustom(){localStorage.setItem("seed_custom_verses",JSON.stringify(customVerses));localStorage.setItem("seed_custom_cats",JSON.stringify(customCats));}
function saveFavs(){localStorage.setItem("seed_favs",JSON.stringify(favorites));}
function isFav(ref){return favorites.includes(ref);}
function toggleFav(ref){
  if(isFav(ref))favorites=favorites.filter(r=>r!==ref);else favorites.push(ref);
  saveFavs();showToast(isFav(ref)?"Added to Favorites":"Removed from Favorites");render();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove("show"),2400);}
function shuffleArray(len){const a=[...Array(len).keys()];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function initFlash(){
  const verses=getVerses();const today=new Date().toDateString();
  const stored=localStorage.getItem("seed_flash_date");
  if(stored!==today){flashOrder=shuffleArray(verses.length);localStorage.setItem("seed_flash_date",today);localStorage.setItem("seed_flash_order",JSON.stringify(flashOrder));flashIndex=0;localStorage.setItem("seed_flash_idx","0");}
  else{const so=JSON.parse(localStorage.getItem("seed_flash_order")||"null");flashOrder=(so&&so.length===verses.length)?so:shuffleArray(verses.length);flashIndex=parseInt(localStorage.getItem("seed_flash_idx")||"0");if(flashIndex>=verses.length)flashIndex=0;}
}
function saveFlashState(){localStorage.setItem("seed_flash_idx",flashIndex);}

let touchStartX=0,touchStartY=0;
function setupSwipe(el){
  el.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
  el.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-touchStartX;const dy=e.changedTouches[0].clientY-touchStartY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){if(dx<0)nextCard();else prevCard();}},{passive:true});
}
function nextCard(){const v=getVerses();flashIndex=(flashIndex+1)%v.length;saveFlashState();renderFlash();}
function prevCard(){const v=getVerses();flashIndex=(flashIndex-1+v.length)%v.length;saveFlashState();renderFlash();}

function renderFlash(){
  const verses=getVerses();const v=verses[flashOrder[flashIndex]%verses.length];
  const card=document.getElementById("flashcard");const countEl=document.getElementById("fcCount");const favBtn=document.getElementById("fcFav");
  if(!card)return;
  card.innerHTML=`<div class="flashcard-ornament">&#10022;</div><div class="flashcard-cat">${v.cat}</div><div class="flashcard-text">"${v.text}"</div><div class="flashcard-ref">${v.ref} &middot; NKJV</div>`;
  if(countEl)countEl.textContent=`${flashIndex+1} / ${verses.length}`;
  if(favBtn){favBtn.className="fc-fav"+(isFav(v.ref)?" active":"");favBtn.innerHTML=isFav(v.ref)?"&#9829;":"&#9825;";}
}
function toggleFlashFav(){const verses=getVerses();const v=verses[flashOrder[flashIndex]%verses.length];toggleFav(v.ref);renderFlash();}

function renderVerseCard(v){
  const sr=v.ref.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  return`<div class="verse-card"><div class="verse-ref"><span>${v.ref} &middot; NKJV</span><span class="verse-category-tag">${v.cat}</span></div><div class="verse-text">"${v.text}"</div><div class="verse-actions"><button class="fav-btn ${isFav(v.ref)?"active":""}" onclick="toggleFav('${sr}')">${isFav(v.ref)?"&#9829;":"&#9825;"}</button></div></div>`;
}

function getFilteredVerses(){
  let list=getVerses();
  if(currentView==="favorites")list=list.filter(v=>isFav(v.ref));
  if(currentView==="browse"&&selectedCat!=="All")list=list.filter(v=>v.cat===selectedCat);
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(v=>v.ref.toLowerCase().includes(q)||v.text.toLowerCase().includes(q)||v.cat.toLowerCase().includes(q));}
  return list;
}

function render(){
  const main=document.getElementById("mainContent");
  if(currentView==="daily"){
    main.innerHTML=`<div class="flashcard-section"><div class="flashcard-label">Today's Verses &middot; Swipe to explore</div><div class="flashcard-wrap" id="flashWrap"><div class="flashcard" id="flashcard"></div></div><div class="swipe-hint">Swipe left / right to navigate</div><div class="flashcard-controls"><button class="fc-btn" onclick="prevCard()">&#8592;</button><span class="fc-count" id="fcCount"></span><button class="fc-fav" id="fcFav" onclick="toggleFlashFav()">&#9825;</button><button class="fc-btn" onclick="nextCard()">&#8594;</button></div></div>`;
    renderFlash();const wrap=document.getElementById("flashWrap");if(wrap)setupSwipe(wrap);return;
  }
  let html="";const list=getFilteredVerses();
  if(currentView==="browse"){
    html+=`<div class="category-chips">`;getCategories().forEach(cat=>{html+=`<button class="chip ${selectedCat===cat?"active":""}" onclick="selectCat('${cat.replace(/'/g,"\\'")}')">${cat}</button>`;});html+=`</div>`;
    html+=`<div class="section-label">${selectedCat==="All"?"All Categories":selectedCat} &middot; ${list.length} verse${list.length!==1?"s":""}</div>`;
  }
  if(currentView==="all")html+=`<div class="section-label">All ${list.length} Verses &middot; NKJV</div>`;
  if(currentView==="favorites")html+=`<div class="section-label">Your Favorites &middot; ${list.length} verse${list.length!==1?"s":""}</div>`;
  if(list.length===0){html+=currentView==="favorites"?`<div class="empty">No favorites yet. Tap &#9825; on any verse to save it here.</div>`:`<div class="empty">No verses found.</div>`;}
  else{html+=`<div class="verse-grid">`;list.forEach(v=>{html+=renderVerseCard(v);});html+=`</div>`;}
  main.innerHTML=html;
}
function selectCat(cat){selectedCat=cat;render();}

function openModal(){populateCatSelect();document.getElementById("newRef").value="";document.getElementById("newText").value="";document.getElementById("newCatInput").value="";document.getElementById("modalOverlay").style.display="flex";}
function closeModal(){document.getElementById("modalOverlay").style.display="none";}
function populateCatSelect(){const sel=document.getElementById("newCat");sel.innerHTML="";[...BASE_CATS,...customCats].forEach(cat=>{const opt=document.createElement("option");opt.value=cat;opt.textContent=cat;sel.appendChild(opt);});}
function addCategory(){const input=document.getElementById("newCatInput");const name=input.value.trim();if(!name)return showToast("Please enter a category name.");if([...BASE_CATS,...customCats].map(c=>c.toLowerCase()).includes(name.toLowerCase()))return showToast("That category already exists.");customCats.push(name);saveCustom();input.value="";populateCatSelect();document.getElementById("newCat").value=name;showToast(`Category "${name}" added.`);}
function saveVerse(){const ref=document.getElementById("newRef").value.trim();const text=document.getElementById("newText").value.trim();const cat=document.getElementById("newCat").value;if(!ref)return showToast("Please enter a verse reference.");if(!text)return showToast("Please enter the verse text.");if(getVerses().find(v=>v.ref.toLowerCase()===ref.toLowerCase()))return showToast("That reference already exists.");customVerses.push({ref,text,cat});saveCustom();initFlash();closeModal();showToast(`"${ref}" added to ${cat}.`);render();}

document.getElementById("modalOverlay").addEventListener("click",e=>{if(e.target===document.getElementById("modalOverlay"))closeModal();});
document.querySelectorAll(".tab").forEach(tab=>{tab.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));tab.classList.add("active");currentView=tab.dataset.view;searchQuery="";document.getElementById("searchInput").value="";render();});});
document.getElementById("searchToggle").addEventListener("click",()=>{searchVisible=!searchVisible;document.getElementById("searchBar").style.display=searchVisible?"block":"none";document.getElementById("searchToggle").classList.toggle("active",searchVisible);if(searchVisible)document.getElementById("searchInput").focus();});
document.getElementById("searchInput").addEventListener("input",e=>{searchQuery=e.target.value;if(searchQuery&&currentView==="daily"){currentView="all";document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view==="all"));}render();});
document.getElementById("darkToggle").addEventListener("click",()=>{isDark=!isDark;document.body.classList.toggle("dark",isDark);localStorage.setItem("seed_dark",isDark);document.getElementById("darkToggle").textContent=isDark?"☀️":"🌙";});
if(isDark)document.getElementById("darkToggle").textContent="☀️";
document.getElementById("addBtn").addEventListener("click",openModal);

// SERVICE WORKER
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").then(r=>console.log("SW registered")).catch(e=>console.log("SW failed",e));});}

initFlash();render();
</script>
</body>
</html>
