<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seed</title>
<meta name="theme-color" content="#FAF4E4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Seed">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#FAF4E4;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;}
#splash.hidden{opacity:0;pointer-events:none;}
.dark #splash{background:#100E08;}
.splash-logo{font-family:'Lora',serif;font-size:3rem;font-weight:700;color:#C49A2A;font-style:italic;letter-spacing:0.02em;animation:pulse-logo 1.8s ease-in-out infinite;}
.splash-logo span{color:#A03020;font-style:normal;}
@keyframes pulse-logo{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(0.97);}}

:root{
  --bg:#FAFAF7;--bg2:#F3F1EA;--card:#FFFFFF;--card2:#F7F5EE;
  --border:#E8E4D8;--ink:#1A1208;--ink2:#4A3F2A;--ink3:#9A8E78;
  --gold:#C49A2A;--gold-bg:#FBF3DC;--gold-border:#E8D48A;
  --red:#A03020;--green:#2A6A3A;--blue:#1A5A8A;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.05);
  --radius:16px;--radius-sm:10px;--radius-lg:24px;
}
.dark{
  --bg:#100E08;--bg2:#1A1610;--card:#1E1A12;--card2:#252018;
  --border:#302A1E;--ink:#F0EAD8;--ink2:#C8B890;--ink3:#7A6E58;
  --gold:#D4A830;--gold-bg:#2A2010;--gold-border:#4A3A18;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;min-height:100dvh;transition:background 0.25s,color 0.25s;overscroll-behavior:none;}
.app-shell{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:var(--bg);padding:0 1.25rem;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.header-logo{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;color:var(--gold);letter-spacing:0.02em;font-style:italic;}
.header-logo span{color:var(--red);font-style:normal;}
.header-right{display:flex;align-items:center;gap:0.5rem;position:relative;}
.hbtn{background:var(--card2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s,border-color 0.15s;color:var(--ink2);}
.hbtn:hover,.hbtn.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold);}

/* HAMBURGER DROPDOWN */
.hamburger-menu{position:absolute;top:calc(100% + 0.5rem);right:0;width:240px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;z-index:200;display:none;animation:fadeDown 0.15s ease;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.hamburger-menu.open{display:block;}
.hm-user{padding:0.85rem 1rem;border-bottom:1px solid var(--border);}
.hm-user-email{font-size:0.82rem;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:0.25rem;}
.hm-user-meta{display:flex;align-items:center;gap:0.4rem;}
.hm-signed-in{font-size:0.72rem;color:var(--ink3);}
.admin-badge{display:inline-flex;align-items:center;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:4px;padding:0.1rem 0.4rem;font-size:0.62rem;font-weight:700;color:var(--gold);letter-spacing:0.06em;text-transform:uppercase;}
.hm-item{display:flex;align-items:center;gap:0.65rem;padding:0.75rem 1rem;font-size:0.88rem;color:var(--ink2);cursor:pointer;transition:background 0.15s;border:none;background:none;width:100%;font-family:'Inter',sans-serif;font-weight:500;text-align:left;}
.hm-item:hover{background:var(--bg2);}
.hm-item svg{flex-shrink:0;color:var(--ink3);}
.hm-item.danger{color:var(--red);}
.hm-item.danger svg{color:var(--red);}
.hm-divider{height:1px;background:var(--border);}

/* SEARCH */
.search-wrap{margin:0.75rem 1.25rem 0;position:relative;}
.search-wrap input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:0.65rem 1rem 0.65rem 2.6rem;font-family:'Inter',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow-sm);}
.search-wrap input::placeholder{color:var(--ink3);}
.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,154,42,0.12);}
.search-icon{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:1.25rem 1.25rem calc(56px + env(safe-area-inset-bottom) + 1rem);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:stretch;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,0.06);height:calc(56px + env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.22rem;cursor:pointer;padding:0.5rem 0;border:none;background:none;color:var(--ink3);font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:500;letter-spacing:0.02em;transition:color 0.15s;position:relative;overflow:hidden;}
.nav-item.active{color:var(--gold);}
.nav-item.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--gold);border-radius:0 0 3px 3px;}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;}
.nav-item.active .nav-icon{transform:scale(1.15);}
.nav-label{line-height:1;}
.nav-item.center-btn{background:var(--gold);color:#fff!important;border-radius:50%;width:48px;height:48px;flex:none;align-self:center;margin-bottom:calc(env(safe-area-inset-bottom)*0.5);box-shadow:0 4px 16px rgba(196,154,42,0.5);font-size:0;padding:0;gap:0;overflow:visible;}
.nav-item.center-btn::after{display:none;}
.nav-item.center-btn .nav-icon{color:#fff;transform:none;}
.nav-item.center-btn:hover{filter:brightness(1.1);}

/* FILTER */
.filter-row{display:flex;gap:0.6rem;margin-bottom:1.1rem;flex-wrap:wrap;}
.filter-pill{display:flex;align-items:center;gap:0.4rem;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:0.4rem 0.9rem;font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:500;color:var(--ink2);cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color 0.15s,background 0.15s;position:relative;}
.filter-pill.has-filter{border-color:var(--gold);background:var(--gold-bg);color:var(--gold);font-weight:600;}
.filter-pill select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;border:none;background:none;font-size:1rem;}
.filter-arrow{font-size:0.65rem;opacity:0.6;}

/* PAGE TITLE */
.page-title{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:0.25rem;}
.page-sub{font-size:0.8rem;color:var(--ink3);margin-bottom:1.25rem;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;margin-top:0.25rem;}
.sec-title{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);}

/* DAILY CARD */
.daily-greeting{margin-bottom:1.25rem;}
.greeting-label{font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.2rem;}
.greeting-date{font-family:'Lora',serif;font-size:1.3rem;font-weight:600;color:var(--ink);}
.verse-hero{background:linear-gradient(145deg,#FBF5E0 0%,#F0E8C8 60%,#EAE0B8 100%);border:1px solid var(--gold-border);border-radius:var(--radius-lg);padding:2rem 1.75rem 1.75rem;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;margin-bottom:1rem;}
.dark .verse-hero{background:linear-gradient(145deg,#2A2210 0%,#221A08 100%);}
.verse-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(196,154,42,0.12) 0%,transparent 70%);border-radius:50%;}
.vh-label{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.75rem;}
.vh-cat{display:inline-flex;align-items:center;background:rgba(196,154,42,0.12);border:1px solid var(--gold-border);border-radius:20px;padding:0.25rem 0.75rem;font-size:0.68rem;font-weight:600;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1.25rem;}
.vh-text{font-family:'Lora',serif;font-size:1.15rem;line-height:1.75;color:var(--ink);font-style:italic;font-weight:400;margin-bottom:1.5rem;}
.vh-footer{display:flex;align-items:center;justify-content:space-between;}
.vh-ref{font-size:0.78rem;font-weight:700;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;}
.vh-actions{display:flex;align-items:center;gap:0.5rem;}
.fav-circle{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink3);box-shadow:var(--shadow-sm);transition:all 0.15s;}
.fav-circle:hover{transform:scale(1.1);}
.fav-circle.active{background:rgba(160,48,32,0.08);border-color:rgba(160,48,32,0.2);color:var(--red);}
.vow-circle{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink3);box-shadow:var(--shadow-sm);transition:all 0.15s;}
.vow-circle:hover{transform:scale(1.1);}
.vow-circle.active{background:rgba(26,90,138,0.08);border-color:rgba(26,90,138,0.2);color:var(--blue);}

/* VOW CARD */
.vow-card{background:linear-gradient(145deg,#EDF4FA 0%,#E0EDF7 100%);border:1px solid #B8D4E8;border-radius:var(--radius-lg);padding:1.5rem 1.5rem 1.4rem;box-shadow:var(--shadow-md);margin-bottom:1rem;position:relative;overflow:hidden;}
.dark .vow-card{background:linear-gradient(145deg,#0E1A24 0%,#0A1420 100%);border-color:#1A3A52;}
.vow-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(26,90,138,0.1) 0%,transparent 70%);border-radius:50%;}
.vow-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;}
.vow-label{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);opacity:0.8;}
.vow-empty{text-align:center;padding:0.5rem 0 0.25rem;}
.vow-empty-text{font-size:0.88rem;color:var(--ink3);margin-bottom:0.85rem;line-height:1.5;}
.vow-set-btn{display:inline-flex;align-items:center;gap:0.4rem;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:0.55rem 1.1rem;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:filter 0.15s;}
.vow-set-btn:hover{filter:brightness(1.1);}
.vow-cat{display:inline-flex;background:rgba(26,90,138,0.1);border:1px solid rgba(26,90,138,0.2);border-radius:20px;padding:0.2rem 0.65rem;font-size:0.65rem;font-weight:600;color:var(--blue);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.85rem;}
.vow-text{font-family:'Lora',serif;font-size:0.98rem;line-height:1.7;color:var(--ink);font-style:italic;margin-bottom:1rem;}
.vow-footer{display:flex;align-items:center;justify-content:space-between;}
.vow-ref{font-size:0.72rem;font-weight:700;color:var(--blue);letter-spacing:0.06em;text-transform:uppercase;opacity:0.8;}

/* STATS */
.quick-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow-sm);}
.stat-num{font-family:'Lora',serif;font-size:1.6rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:0.25rem;}
.stat-label{font-size:0.72rem;color:var(--ink3);font-weight:500;}

/* VERSE CARDS */
.verse-list{display:flex;flex-direction:column;gap:0.75rem;}
.verse-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow-sm);transition:box-shadow 0.2s,transform 0.15s;}
.verse-card:active{transform:scale(0.99);}
.vc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem;gap:0.5rem;}
.vc-ref{font-size:0.72rem;font-weight:700;color:var(--gold);letter-spacing:0.06em;text-transform:uppercase;}
.vc-cat{font-size:0.62rem;font-weight:600;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);border-radius:6px;padding:0.15rem 0.45rem;letter-spacing:0.04em;white-space:nowrap;}
.vc-text{font-family:'Lora',serif;font-size:0.95rem;line-height:1.7;color:var(--ink2);font-style:italic;margin-bottom:0.75rem;}
.vc-bottom{display:flex;justify-content:flex-end;align-items:center;gap:0.4rem;}
.fav-btn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:0.2rem;transition:color 0.15s,transform 0.1s;display:flex;align-items:center;}
.fav-btn:hover{transform:scale(1.2);}
.fav-btn.active{color:var(--red);}
.vow-btn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:0.2rem;transition:color 0.15s,transform 0.1s;display:flex;align-items:center;}
.vow-btn:hover{transform:scale(1.2);}
.vow-btn.active{color:var(--blue);}
.note-btn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:0.2rem;transition:color 0.15s,transform 0.1s;display:flex;align-items:center;}
.note-btn:hover{transform:scale(1.2);}
.note-btn.active{color:var(--green);}

/* SKELETONS */
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,var(--border) 50%,var(--card2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-hero{height:260px;border-radius:var(--radius-lg);margin-bottom:1rem;}
.skel-vow{height:160px;border-radius:var(--radius-lg);margin-bottom:1rem;}
.skel-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.skel-stat{height:80px;border-radius:var(--radius);}
.skel-card{height:110px;border-radius:var(--radius);margin-bottom:0.75rem;}
.skel-title{height:28px;border-radius:6px;width:50%;margin-bottom:0.4rem;}
.skel-sub{height:14px;border-radius:4px;width:70%;margin-bottom:1.25rem;}

/* ADMIN CHOICE */
.admin-choice{display:flex;flex-direction:column;gap:0.75rem;padding:0.25rem 0 0.5rem;}
.choice-btn{display:flex;align-items:center;gap:0.85rem;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;text-align:left;}
.choice-btn:hover{border-color:var(--gold);background:var(--gold-bg);}
.choice-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.choice-icon.base{background:var(--gold-bg);color:var(--gold);}
.choice-icon.personal{background:rgba(42,106,58,0.1);color:var(--green);}
.choice-title{font-size:0.9rem;font-weight:600;color:var(--ink);margin-bottom:0.15rem;}
.choice-sub{font-size:0.75rem;color:var(--ink3);}

/* AUTH */
.auth-wrap{padding:2rem 1.25rem;}
.auth-hero{text-align:center;margin-bottom:2rem;}
.auth-logo{font-family:'Lora',serif;font-size:2.5rem;font-weight:700;color:var(--gold);font-style:italic;margin-bottom:0.5rem;}
.auth-logo span{color:var(--red);font-style:normal;}
.auth-tagline{font-size:0.88rem;color:var(--ink3);line-height:1.5;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem 1.5rem;box-shadow:var(--shadow-md);}
.auth-card-title{font-family:'Lora',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:0.25rem;}
.auth-card-sub{font-size:0.82rem;color:var(--ink3);margin-bottom:1.5rem;}
.auth-field{margin-bottom:1rem;}
.auth-label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.4rem;}
.auth-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 1rem;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.auth-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,154,42,0.12);}
.auth-btn{width:100%;margin-top:0.5rem;background:var(--gold);color:#fff;border:none;border-radius:50px;padding:0.9rem;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;letter-spacing:0.02em;box-shadow:0 4px 16px rgba(196,154,42,0.35);transition:filter 0.15s,transform 0.1s;}
.auth-btn:hover{filter:brightness(1.08);}
.auth-btn:active{transform:scale(0.98);}
.auth-btn:disabled{opacity:0.55;cursor:not-allowed;}
.auth-switch{margin-top:1.25rem;text-align:center;font-size:0.84rem;color:var(--ink3);}
.auth-switch a{color:var(--gold);cursor:pointer;font-weight:600;}
.auth-error{margin-top:0.85rem;padding:0.6rem 0.9rem;background:rgba(160,48,32,0.07);border:1px solid rgba(160,48,32,0.2);border-radius:8px;font-size:0.82rem;color:var(--red);}
.auth-success{margin-top:0.85rem;padding:0.6rem 0.9rem;background:rgba(42,106,58,0.07);border:1px solid rgba(42,106,58,0.2);border-radius:8px;font-size:0.82rem;color:var(--green);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,8,4,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:1.5rem 1.5rem 2.5rem;width:100%;max-width:480px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-family:'Lora',serif;font-size:1.15rem;font-weight:700;color:var(--ink);margin-bottom:1.25rem;}
.modal label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.4rem;margin-top:1rem;}
.modal label:first-of-type{margin-top:0;}
.modal input,.modal textarea,.modal select{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.7rem 0.9rem;font-family:'Inter',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s;resize:vertical;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,154,42,0.1);}
.modal textarea{min-height:90px;}
.modal-actions{display:flex;gap:0.75rem;margin-top:1.5rem;}
.btn{font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:600;padding:0.7rem 1.25rem;border-radius:50px;border:none;cursor:pointer;transition:all 0.15s;flex:1;}
.btn-primary{background:var(--gold);color:#fff;box-shadow:0 2px 8px rgba(196,154,42,0.3);}

/* CONFIRM */

/* EMPTY / TOAST */
.empty{text-align:center;padding:3rem 1rem;color:var(--ink3);font-style:italic;font-size:0.95rem;}
.toast{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom) + 1rem);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-family:'Inter',sans-serif;font-size:0.84rem;font-weight:500;padding:0.65rem 1.25rem;border-radius:50px;box-shadow:var(--shadow-lg);opacity:0;transition:transform 0.25s ease,opacity 0.25s ease;z-index:400;white-space:nowrap;pointer-events:none;}

<script>
const SUPA_URL="https://lbdjclsoayhnesavsnam.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxiZGpjbHNvYXlobmVzYXZzbmFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzY0ODIsImV4cCI6MjA5NzI1MjQ4Mn0.Kk1OPpRfot2TetIf-GzSexnYsmHpuyWxT2r2BfsR62A";
const ADMIN_EMAIL="matnarca@gmail.com";
const{createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

// CANONICAL BIBLE ORDER
const BIBLE_ORDER=["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Psalm","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi","Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"];

function bookOrder(book){
  const idx=BIBLE_ORDER.findIndex(b=>b.toLowerCase()===book.toLowerCase());
  return idx===-1?999:idx;
}

function parseVerseRef(ref){
  const match=ref.match(/^(.+?)\s+(\d+)(?::(\d+)(?:-(\d+))?)?$/);
  if(!match)return{book:ref,chapter:0,verseStart:0};
  return{book:match[1].trim(),chapter:parseInt(match[2])||0,verseStart:parseInt(match[3])||0};
}

function sortByCanonical(verses){
  return [...verses].sort((a,b)=>{
    const pa=parseVerseRef(a.ref);
    const pb=parseVerseRef(b.ref);
    const bo=bookOrder(pa.book)-bookOrder(pb.book);
    if(bo!==0)return bo;
    if(pa.chapter!==pb.chapter)return pa.chapter-pb.chapter;
    return pa.verseStart-pb.verseStart;
  });
}

// STATE
let currentUser=null;
let baseVerses=[],customVerses=[],categories=[],favBaseIds=[],favCustomIds=[],notesMap={};
let vowData=null;
let isDark=localStorage.getItem("seed_dark")==="true";
let searchVisible=false,searchQuery="",selectedCat="All",selectedBook="All",currentView="daily";
let authMode="login",isAdmin=false,isAddingBase=false;
let confirmResolve=null;
let activeNoteVerse=null;

if(isDark)document.body.classList.add("dark");

// SPLASH
function hideSplash(){
  const s=document.getElementById("splash");
  if(s){s.classList.add("hidden");setTimeout(()=>s.remove(),500);}
}

// HELPERS
function sanitize(str){
  if(!str)return"";
  const el=document.createElement("div");el.textContent=String(str);return el.innerHTML;
}
function sanitizeInput(str){
  if(!str)return"";
  // Strip HTML tags and dangerous patterns
  return String(str)
    .replace(/<[^>]*>/g,"")
    .replace(/javascript:/gi,"")
    .replace(/on\w+\s*=/gi,"")
    .trim();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2500);}
function getBook(ref){return ref.replace(/\s+\d.*$/,"").trim();}
function getWeekNumber(){
  const d=new Date();const s=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  s.setUTCDate(s.getUTCDate()+4-(s.getUTCDay()||7));
  const y=new Date(Date.UTC(s.getUTCFullYear(),0,1));
  return{week:Math.ceil((((s-y)/86400000)+1)/7),year:s.getUTCFullYear()};
}

function getAllVerses(){
  return[
    ...baseVerses.map(v=>({...v,source:"base"})),
    ...customVerses.map(v=>({...v,source:"custom"}))
  ];
}
function getCatName(catId){const c=categories.find(x=>x.id===catId);return c?c.name:"--";}
function isFav(v){return v.source==="base"?favBaseIds.includes(v.id):favCustomIds.includes(v.id);}
function hasNote(v){return!!notesMap[v.source+":"+v.id];}
function getNote(v){return notesMap[v.source+":"+v.id]||null;}
function noteKey(v){return v.source+":"+v.id;}

function getBooks(){
  const books=[...new Set(getAllVerses().map(v=>getBook(v.ref)))];
  books.sort((a,b)=>{
    const bo=bookOrder(a)-bookOrder(b);
    return bo!==0?bo:a.localeCompare(b);
  });
  return["All",...books];
}
function getCategoryNames(){return["All",...categories.map(c=>c.name)];}

// LOAD DATA
async function loadUserData(){
  const{week,year}=getWeekNumber();
  const[catRes,baseRes,customRes,favRes,vowRes,noteRes]=await Promise.all([
    db.from("categories").select("id,name,is_base").order("name"),
    db.from("verses").select("id,ref,text,cat_id,translation").order("ref"),
    db.from("custom_verses").select("id,ref,text,cat_id").eq("user_id",currentUser.id).order("created_at"),
    db.from("favorites").select("id,base_verse_id,custom_verse_id").eq("user_id",currentUser.id),
    db.from("verse_of_week").select("*").eq("user_id",currentUser.id).eq("week_number",week).eq("year",year).maybeSingle(),
    db.from("notes").select("id,base_verse_id,custom_verse_id,note").eq("user_id",currentUser.id),
  ]);
  categories=catRes.data||[];
  baseVerses=(baseRes.data||[]).map(v=>({...v,cat:getCatName(v.cat_id)}));
  customVerses=(customRes.data||[]).map(v=>({...v,cat:getCatName(v.cat_id)}));
  const favs=favRes.data||[];
  favBaseIds=favs.filter(f=>f.base_verse_id).map(f=>f.base_verse_id);
  favCustomIds=favs.filter(f=>f.custom_verse_id).map(f=>f.custom_verse_id);
  vowData=vowRes.data||null;
  notesMap={};
  (noteRes.data||[]).forEach(n=>{
    if(n.base_verse_id)notesMap["base:"+n.base_verse_id]=n;
    if(n.custom_verse_id)notesMap["custom:"+n.custom_verse_id]=n;
  });
}
async function loadUserDataSafe(){
  const timeout=new Promise(resolve=>setTimeout(resolve,6000));
  await Promise.race([loadUserData(),timeout]);
}

// FAVORITES
async function toggleFav(v){
  if(isFav(v)){
    if(v.source==="base"){favBaseIds=favBaseIds.filter(id=>id!==v.id);await db.from("favorites").delete().eq("user_id",currentUser.id).eq("base_verse_id",v.id);}
    else{favCustomIds=favCustomIds.filter(id=>id!==v.id);await db.from("favorites").delete().eq("user_id",currentUser.id).eq("custom_verse_id",v.id);}
    showToast("Removed from Saved");
  }else{
    if(v.source==="base"){favBaseIds.push(v.id);await db.from("favorites").insert({user_id:currentUser.id,base_verse_id:v.id});}
    else{favCustomIds.push(v.id);await db.from("favorites").insert({user_id:currentUser.id,custom_verse_id:v.id});}
    showToast("Saved!");
  }
  render();
}
async function toggleFavById(id,source){
  const v=getAllVerses().find(x=>x.id===id&&x.source===source);
  if(v)await toggleFav(v);
}

// VERSE OF WEEK
function getVowVerse(){
  if(!vowData)return null;
  const{week,year}=getWeekNumber();
  if(vowData.week_number!==week||vowData.year!==year)return null;
  const all=getAllVerses();
  if(vowData.base_verse_id)return all.find(v=>v.id===vowData.base_verse_id&&v.source==="base")||null;
  if(vowData.custom_verse_id)return all.find(v=>v.id===vowData.custom_verse_id&&v.source==="custom")||null;
  return null;
}
function isCurrentVow(v){
  if(!vowData)return false;
  const{week,year}=getWeekNumber();
  if(vowData.week_number!==week||vowData.year!==year)return false;
  return(v.source==="base"&&vowData.base_verse_id===v.id)||(v.source==="custom"&&vowData.custom_verse_id===v.id);
}
async function setVow(v){
  const{week,year}=getWeekNumber();
  const row={user_id:currentUser.id,week_number:week,year,base_verse_id:null,custom_verse_id:null};
  if(v.source==="base")row.base_verse_id=v.id;else row.custom_verse_id=v.id;
  if(vowData){const{data,error}=await db.from("verse_of_week").update(row).eq("id",vowData.id).select().single();if(!error)vowData=data;}
  else{const{data,error}=await db.from("verse_of_week").insert(row).select().single();if(!error)vowData=data;}
  showToast("Verse of the Week set!");closeVowPicker();render();
}
async function setVowById(id,source){
  const v=getAllVerses().find(x=>x.id===id&&x.source===source);
  if(!v)return;
  const existing=getVowVerse();
  if(existing&&existing.id!==v.id){
    const ok=await showConfirm("Replace Verse of the Week?",`"${v.ref}" will replace your current verse of the week.`);
    if(!ok)return;
  }

// DAILY VERSE
function getDailyVerse(){
  const all=getAllVerses();if(!all.length)return null;
  const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  const day=Math.floor((now-start)/86400000);
  return all[((now.getFullYear()*1000)+day)%all.length];
}

function renderNoteModalBody(existing,v){
  const body=document.getElementById("noteModalBody");
  if(existing){
    body.innerHTML=`
      <div class="note-ref-label">${sanitize(v.ref)}</div>
      <div class="note-text-display" id="noteDisplay">${sanitize(existing.note)}</div>
      <div class="modal-actions" style="margin-top:1rem;">

        <button class="btn btn-primary" onclick="switchToEditNote()">Edit</button>
      </div>`;
  }else{
    body.innerHTML=`
      <div class="note-ref-label">${sanitize(v.ref)}</div>
      <textarea id="noteInput" placeholder="Write your note here..." maxlength="2000" style="min-height:120px;margin-top:0.5rem;width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.7rem 0.9rem;font-family:'Inter',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;resize:vertical;"></textarea>
      <div id="noteMsgArea"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeNoteModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveNote()">Save Note</button>
      </div>`;
    setTimeout(()=>{const el=document.getElementById("noteInput");if(el)el.focus();},100);
  }
}
function switchToEditNote(){
  const existing=getNote(activeNoteVerse);
  const body=document.getElementById("noteModalBody");
  document.getElementById("noteModalTitle").textContent="Edit Note";
  body.innerHTML=`
    <div class="note-ref-label">${sanitize(activeNoteVerse.ref)}</div>
    <textarea id="noteInput" maxlength="2000" style="min-height:120px;margin-top:0.5rem;width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.7rem 0.9rem;font-family:'Inter',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;resize:vertical;">${sanitize(existing?existing.note:"")}</textarea>
    <div id="noteMsgArea"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeNoteModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNote()">Save Note</button>
    </div>`;
  setTimeout(()=>{const el=document.getElementById("noteInput");if(el)el.focus();},100);
}
async function saveNote(){
  const input=document.getElementById("noteInput");
  const msgArea=document.getElementById("noteMsgArea");
  if(!input||!activeNoteVerse)return;
  const raw=input.value.trim();
  const noteText=sanitizeInput(raw);
  if(!noteText){msgArea.innerHTML=`<div class="modal-error">Please enter a note.</div>`;return;}
  if(noteText.length>2000){msgArea.innerHTML=`<div class="modal-error">Note must be 2000 characters or less.</div>`;return;}

  const existing=getNote(activeNoteVerse);
  const v=activeNoteVerse;
  const row={user_id:currentUser.id,note:noteText,base_verse_id:null,custom_verse_id:null};
  if(v.source==="base")row.base_verse_id=v.id;else row.custom_verse_id=v.id;

  if(existing){
    const{data,error}=await db.from("notes").update({note:noteText}).eq("id",existing.id).select().single();
    if(error){msgArea.innerHTML=`<div class="modal-error">Error saving note.</div>`;return;}
    notesMap[noteKey(v)]=data;
  }else{
    const{data,error}=await db.from("notes").insert(row).select().single();
    if(error){msgArea.innerHTML=`<div class="modal-error">Error saving note.</div>`;return;}
    notesMap[noteKey(v)]=data;
  }
  closeNoteModal();showToast("Note saved.");render();
}
async function deleteNote(){
  const v=activeNoteVerse;
  const existing=getNote(v);
  if(!existing)return;
  const{error}=await db.from("notes").delete().eq("id",existing.id);
  if(error){showToast("Error deleting note.");return;}
  delete notesMap[noteKey(v)];
  closeNoteModal();showToast("Note deleted.");render();
}
document.getElementById("noteModalOverlay").addEventListener("click",e=>{if(e.target===document.getElementById("noteModalOverlay"))closeNoteModal();});

// FILTER ROW
function filterRowHTML(){
  const cats=getCategoryNames();
  const books=getBooks();
  const catActive=selectedCat!=="All";
  const bookActive=selectedBook!=="All";
  const catOptions=cats.map(c=>`<option value="${c.replace(/"/g,"&quot;")}" ${selectedCat===c?"selected":""}>${sanitize(c)}</option>`).join("");
  const bookOptions=books.map(b=>`<option value="${b.replace(/"/g,"&quot;")}" ${selectedBook===b?"selected":""}>${sanitize(b)}</option>`).join("");
  return`<div class="filter-row">
    <div class="filter-pill ${catActive?"has-filter":""}">
      ${catActive?sanitize(selectedCat):"Category"} <span class="filter-arrow">&#9660;</span>
      <select onchange="selectCat(this.value)">${catOptions}</select>
    </div>
    <div class="filter-pill ${bookActive?"has-filter":""}">
      ${bookActive?sanitize(selectedBook):"Book"} <span class="filter-arrow">&#9660;</span>
      <select onchange="selectBook(this.value)">${bookOptions}</select>
    </div>
  </div>`;
}
function selectCat(v){selectedCat=v;render();}
function selectBook(v){selectedBook=v;render();}

function getFiltered(list){
  if(selectedCat!=="All")list=list.filter(v=>v.cat===selectedCat);
  if(selectedBook!=="All")list=list.filter(v=>getBook(v.ref)===selectedBook);
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(v=>v.ref.toLowerCase().includes(q)||v.text.toLowerCase().includes(q)||v.cat.toLowerCase().includes(q));}
  return list;
}

// MAIN RENDER
function render(){
  const main=document.getElementById("mainContent");
  if(!currentUser){renderAuth();return;}
  if(currentView==="daily"){renderDaily();return;}
  let list=[],html="";
  if(currentView==="browse"){
    list=getFiltered(sortByCanonical(getAllVerses()));
    html+=`<div class="page-title">Browse</div><div class="page-sub">Filter by category or book</div>${filterRowHTML()}`;
  }
  if(currentView==="myverses"){
    list=getFiltered(sortByCanonical(customVerses.map(v=>({...v,source:"custom"}))));
    html+=`<div class="page-title">My Verses</div><div class="page-sub">${customVerses.length} verse${customVerses.length!==1?"s":""} added by you</div>${filterRowHTML()}`;
  }
  if(currentView==="favorites"){
    const all=sortByCanonical(getAllVerses());
    list=getFiltered(all.filter(v=>isFav(v)));
    html+=`<div class="page-title">Saved</div><div class="page-sub">${favBaseIds.length+favCustomIds.length} verse${favBaseIds.length+favCustomIds.length!==1?"s":""} saved</div>${filterRowHTML()}`;
  }
  html+=`<div class="sec-header"><span class="sec-title">Results</span><span class="sec-title">${list.length} verse${list.length!==1?"s":""}</span></div>`;
  if(list.length===0){
    if(currentView==="favorites")html+=`<div class="empty">Nothing saved yet. Tap the heart on any verse to save it here.</div>`;
    else if(currentView==="myverses")html+=`<div class="empty">No verses added yet. Tap + to add your first verse.</div>`;
    else html+=`<div class="empty">No verses found for these filters.</div>`;
  }else{
    html+=`<div class="verse-list">${list.map(v=>renderVerseCard(v)).join("")}</div>`;
  }
  main.innerHTML=html;
}

  body.innerHTML=`
    <label>Reference (e.g. John 3:16)</label>
    <input type="text" id="newRef" placeholder="Book chapter:verse" maxlength="60">
    <label>Verse Text</label>
    <textarea id="newText" placeholder="Type or paste the verse here..." maxlength="2000"></textarea>
    <label>Category</label>
    <select id="newCat"></select>
    <div style="margin-top:1rem;">
      <div style="font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.5rem;">Or create a new category</div>
      <div class="new-cat-row">
        <input type="text" id="newCatInput" placeholder="New category name..." maxlength="50">
        <button class="btn btn-primary" onclick="addCategory()">Add</button>
      </div>
      <div id="catMsg"></div>
    </div>
    <div id="verseMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveVerseBtn" onclick="saveVerse()">Save Verse</button>
    </div>`;
  populateCatSelect();
  overlay.style.display="flex";
}
function closeModal(){document.getElementById("modalOverlay").style.display="none";}
function populateCatSelect(){
  const sel=document.getElementById("newCat");if(!sel)return;
  sel.innerHTML="";
  categories.forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.name;sel.appendChild(o);});
}

async function addCategory(){
  const input=document.getElementById("newCatInput");
  const name=sanitizeInput(input.value.trim());
  const msg=document.getElementById("catMsg");
  msg.innerHTML="";
  if(!name){msg.innerHTML=`<div class="modal-error">Enter a category name.</div>`;return;}
  const{data:existing}=await db.from("categories").select("id").ilike("name",name).maybeSingle();
  if(existing){msg.innerHTML=`<div class="modal-error">"${sanitize(name)}" already exists as a category.</div>`;return;}
  const{data,error}=await db.from("categories").insert({name,is_base:isAdmin&&isAddingBase}).select().single();
  if(error){msg.innerHTML=`<div class="modal-error">Error saving category.</div>`;return;}
  categories.push({id:data.id,name:data.name,is_base:data.is_base});
  input.value="";populateCatSelect();
  document.getElementById("newCat").value=data.id;
  msg.innerHTML=`<div class="modal-success">"${sanitize(name)}" added.</div>`;
}

async function saveVerse(){
  const ref=sanitizeInput(document.getElementById("newRef").value.trim());
  const text=sanitizeInput(document.getElementById("newText").value.trim());
  const catId=document.getElementById("newCat").value;
  const msg=document.getElementById("verseMsg");
  const btn=document.getElementById("saveVerseBtn");
  msg.innerHTML="";
  if(!ref){msg.innerHTML=`<div class="modal-error">Enter a verse reference.</div>`;return;}
  if(!text){msg.innerHTML=`<div class="modal-error">Enter the verse text.</div>`;return;}
  if(!catId){msg.innerHTML=`<div class="modal-error">Select a category.</div>`;return;}
  btn.disabled=true;btn.textContent="Checking...";
  const[baseCheck,customCheck]=await Promise.all([
    db.from("verses").select("id").ilike("ref",ref).maybeSingle(),
    db.from("custom_verses").select("id").ilike("ref",ref).eq("user_id",currentUser.id).maybeSingle(),
  ]);
  if(baseCheck.data||customCheck.data){
    msg.innerHTML=`<div class="modal-error">"${sanitize(ref)}" already exists.</div>`;
    btn.disabled=false;btn.textContent="Save Verse";return;
  }
  btn.textContent="Saving...";
  if(isAddingBase&&isAdmin){
    const{data,error}=await db.from("verses").insert({ref,text,cat_id:catId,translation:"NKJV"}).select().single();
    if(error){msg.innerHTML=`<div class="modal-error">Error saving verse.</div>`;btn.disabled=false;btn.textContent="Save Verse";return;}
    baseVerses.push({...data,cat:getCatName(catId),source:"base"});
  }else{
    const{data,error}=await db.from("custom_verses").insert({user_id:currentUser.id,ref,text,cat_id:catId,cat:getCatName(catId)}).select().single();
    if(error){msg.innerHTML=`<div class="modal-error">Error saving verse.</div>`;btn.disabled=false;btn.textContent="Save Verse";return;}
    customVerses.push({...data,cat:getCatName(catId),source:"custom"});
  }
  btn.disabled=false;btn.textContent="Save Verse";
  closeModal();showToast(`"${ref}" added.`);render();
}

// EVENTS
document.getElementById("modalOverlay").addEventListener("click",e=>{if(e.target===document.getElementById("modalOverlay"))closeModal();});
document.querySelectorAll(".nav-item[data-view]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-item[data-view]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentView=btn.dataset.view;
    searchQuery="";selectedCat="All";selectedBook="All";
    document.getElementById("searchInput").value="";
    if(searchVisible){searchVisible=false;document.getElementById("searchBar").style.display="none";document.getElementById("searchToggle").classList.remove("active");}
    render();
  });
});
document.getElementById("searchToggle").addEventListener("click",()=>{
  searchVisible=!searchVisible;
  document.getElementById("searchBar").style.display=searchVisible?"block":"none";
  document.getElementById("searchToggle").classList.toggle("active",searchVisible);
  if(searchVisible)document.getElementById("searchInput").focus();
});
document.getElementById("searchInput").addEventListener("input",e=>{
  searchQuery=e.target.value;
  if(searchQuery&&currentView==="daily"){
    currentView="browse";
    document.querySelectorAll(".nav-item[data-view]").forEach(b=>b.classList.toggle("active",b.dataset.view==="browse"));
  }
  render();
});
document.getElementById("addBtn").addEventListener("click",()=>{
  if(isAdmin)openModal(false);
  else openModal(false);
});
document.getElementById("signOutBtn").addEventListener("click",signOut);

// APPLY USER UI
function applyUserUI(user){
  currentUser=user;
  isAdmin=user.email===ADMIN_EMAIL;
  document.getElementById("hmEmail").textContent=user.email;
  document.getElementById("adminBadge").style.display=isAdmin?"inline-flex":"none";
  document.getElementById("signOutBtn").style.display="flex";
  document.getElementById("addBtn").style.display="flex";
}

// AUTH STATE
db.auth.onAuthStateChange(async(event,session)=>{
  if(event==="SIGNED_OUT"||event==="USER_DELETED"){
    currentUser=null;baseVerses=[];customVerses=[];categories=[];favBaseIds=[];favCustomIds=[];vowData=null;notesMap={};isAdmin=false;
    document.getElementById("signOutBtn").style.display="none";
    document.getElementById("addBtn").style.display="none";
    hideSplash();render();return;
  }
  if(event==="SIGNED_IN"&&session){
    applyUserUI(session.user);
    document.getElementById("mainContent").innerHTML=skelDaily();
    await loadUserDataSafe();hideSplash();render();return;
  }
  if(event==="TOKEN_REFRESHED"&&session){
    applyUserUI(session.user);
    await loadUserDataSafe();hideSplash();render();return;
  }
});
(async()=>{
  try{
    const{data:{session}}=await db.auth.getSession();
    if(session){
      applyUserUI(session.user);
      document.getElementById("mainContent").innerHTML=skelDaily();
      await loadUserDataSafe();hideSplash();render();
    }else{hideSplash();currentUser=null;render();}
  }catch(e){hideSplash();currentUser=null;render();}
})();

if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(e=>console.log("SW failed",e));});}
</script>
</body>
</html>
