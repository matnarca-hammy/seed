    --border: #D4C49A; --shadow: rgba(44,31,14,0.12);

    --ink: #F0E6C8; --ink-mid: #C8B07A; --ink-light: #9A825A;

  /* HEADER */

  .logo { font-family:'Lora',serif; font-size:1.6rem; font-weight:700; color:var(--gold); letter-spacing:0.04em; display:flex; align-items:center; gap:0.4rem; }

  .header-actions { display:flex; align-items:center; gap:0.75rem; }
  .icon-btn { background:none; border:none; cursor:pointer; color:var(--ink-mid); padding:0.4rem; border-radius:6px; transition:background 0.15s,color 0.15s; font-size:1.1rem; display:flex; align-items:center; justify-content:center; }

  .nav-inner { max-width:900px; margin:0 auto; display:flex; padding:0 1.5rem; }
  .tab { background:none; border:none; cursor:pointer; font-family:'Source Serif 4',serif; font-size:0.85rem; font-weight:500; color:var(--ink-light); padding:0.75rem 1rem; border-bottom:2px solid transparent; white-space:nowrap; transition:color 0.15s,border-color 0.15s; letter-spacing:0.02em; }
  .tab:hover { color:var(--ink-mid); } .tab.active { color:var(--gold); border-bottom-color:var(--gold); }

  /* SEARCH */
  .search-bar { max-width:900px; margin:1.25rem auto 0; padding:0 1.5rem; }
  .search-wrap { position:relative; }
  .search-wrap input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.7rem 1rem 0.7rem 2.75rem; font-family:'Source Serif 4',serif; font-size:0.95rem; color:var(--ink); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }

  .search-wrap input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,134,11,0.15); }
  .search-icon { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:var(--ink-light); font-size:1rem; pointer-events:none; }

  /* MAIN */
  main { max-width:900px; margin:0 auto; padding:1.5rem 1.5rem 4rem; }

  /* VERSE CARDS */

  .verse-ref { font-family:'Lora',serif; font-size:0.78rem; font-weight:600; color:var(--gold); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.4rem; }
  .verse-category-tag { font-size:0.68rem; background:var(--parchment-deeper); color:var(--ink-mid); border-radius:4px; padding:0.15rem 0.5rem; letter-spacing:0.06em; font-weight:500; }

  .verse-actions { margin-top:0.75rem; display:flex; gap:0.5rem; justify-content:flex-end; }

  .chip:hover { background:var(--parchment-deeper); } .chip.active { background:var(--gold); color:#fff; border-color:var(--gold); }

  .flashcard-text { font-family:'Lora',serif; font-size:1.45rem; line-height:1.7; color:var(--ink); font-style:italic; font-weight:400; margin-bottom:1.5rem; }
  .flashcard-ref { font-family:'Source Serif 4',serif; font-size:0.88rem; font-weight:600; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; }
  .flashcard-controls { margin-top:1.75rem; display:flex; align-items:center; gap:1.25rem; }
  .fc-fav { background:none; border:none; cursor:pointer; font-size:1.6rem; color:var(--ink-light); transition:color 0.15s,transform 0.1s; padding:0.25rem; }
  .fc-fav:hover { transform:scale(1.2); } .fc-fav.active { color:var(--red-earth); }

  /* AUTH SCREEN */
  .auth-screen { max-width:420px; margin:3rem auto; padding:0 1.5rem; }
  .auth-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:2.5rem 2rem; box-shadow:0 8px 32px var(--shadow); }
  .auth-title { font-family:'Lora',serif; font-size:1.4rem; font-weight:700; color:var(--ink); margin-bottom:0.4rem; }
  .auth-subtitle { font-size:0.9rem; color:var(--ink-light); margin-bottom:2rem; line-height:1.5; }
  .auth-label { display:block; font-size:0.78rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-light); margin-bottom:0.4rem; margin-top:1rem; }
  .auth-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.7rem 0.9rem; font-family:'Source Serif 4',serif; font-size:0.95rem; color:var(--ink); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  .auth-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,134,11,0.15); }
  .auth-btn { width:100%; margin-top:1.5rem; background:var(--gold); color:#fff; border:none; border-radius:8px; padding:0.8rem; font-family:'Source Serif 4',serif; font-size:1rem; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .auth-btn:hover { background:var(--gold-light); }
  .auth-btn:disabled { opacity:0.6; cursor:not-allowed; }
  .auth-switch { margin-top:1.25rem; text-align:center; font-size:0.88rem; color:var(--ink-light); }
  .auth-switch a { color:var(--gold); cursor:pointer; text-decoration:none; font-weight:600; }
  .auth-switch a:hover { text-decoration:underline; }
  .auth-error { margin-top:1rem; padding:0.65rem 0.9rem; background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; font-size:0.85rem; color:#b91c1c; }
  .dark .auth-error { background:#3A0A0A; border-color:#7f1d1d; color:#fca5a5; }
  .auth-success { margin-top:1rem; padding:0.65rem 0.9rem; background:#f0fdf4; border:1px solid #86efac; border-radius:8px; font-size:0.85rem; color:#166534; }
  .dark .auth-success { background:#0A2A0A; border-color:#166534; color:#86efac; }

  /* USER PILL */
  .user-pill { font-size:0.78rem; color:var(--ink-light); background:var(--parchment-deeper); border-radius:20px; padding:0.25rem 0.75rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(44,31,14,0.55); z-index:200; display:flex; align-items:center; justify-content:center; padding:1.5rem; backdrop-filter:blur(2px); }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:100%; max-width:520px; box-shadow:0 16px 48px var(--shadow); max-height:90vh; overflow-y:auto; }

  .fab { position:fixed; bottom:2rem; right:1.5rem; width:52px; height:52px; background:var(--gold); color:#fff; border:none; border-radius:50%; font-size:1.5rem; cursor:pointer; box-shadow:0 4px 16px rgba(184,134,11,0.4); display:flex; align-items:center; justify-content:center; transition:background 0.15s,transform 0.15s; z-index:150; }

  .spinner { display:inline-block; width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:0.75rem; }

  .empty { text-align:center; padding:3rem 1rem; color:var(--ink-light); font-style:italic; font-size:1rem; }
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:var(--parchment); font-family:'Source Serif 4',serif; font-size:0.88rem; padding:0.65rem 1.25rem; border-radius:8px; box-shadow:0 4px 16px var(--shadow); transition:transform 0.3s ease; z-index:1000; white-space:nowrap; pointer-events:none; }

  @media (max-width:600px) {
    .flashcard-text { font-size:1.15rem; }
    .flashcard { padding:2.25rem 1.5rem 2rem; min-height:260px; }
    main { padding:1.25rem 1rem 4rem; }
    .user-pill { max-width:90px; }
  }
</style>

  { ref:"Matthew 7:11", text:"If you then, being evil, know how to give good gifts to your children, how much more will your Father who is in heaven give good things to those who ask Him!", cat:"Provision" },
  { ref:"Psalm 34:10", text:"The young lions lack and suffer hunger; but those who seek the LORD shall not lack any good thing.", cat:"Provision" },
  { ref:"Deuteronomy 2:7", text:"For the LORD your God has blessed you in all the work of your hand. He knows your trudging through this great wilderness. These forty years the LORD your God has been with you; you have lacked nothing.", cat:"Provision" },
  { ref:"Genesis 22:14", text:"And Abraham called the name of the place, The-LORD-Will-Provide; as it is said to this day, 'In the Mount of the LORD it shall be provided.'", cat:"Provision" },
  { ref:"2 Corinthians 9:10", text:"Now may He who supplies seed to the sower, and bread for food, supply and multiply the seed you have sown and increase the fruits of your righteousness.", cat:"Provision" },
  { ref:"Psalm 37:25", text:"I have been young, and now am old; yet I have not seen the righteous forsaken, nor his descendants begging bread.", cat:"Provision" },
  { ref:"Joshua 1:8", text:"This Book of the Law shall not depart from your mouth, but you shall meditate in it day and night, that you may observe to do according to all that is written in it. For then you will make your way prosperous, and then you will have good success.", cat:"Breakthrough" },
  { ref:"Psalm 5:12", text:"For You, O LORD, will bless the righteous; with favor You will surround him as with a shield.", cat:"Breakthrough" },
  { ref:"Numbers 6:24-26", text:"The LORD bless you and keep you; the LORD make His face shine upon you, and be gracious to you; the LORD lift up His countenance upon you, and give you peace.", cat:"Breakthrough" },
  { ref:"Deuteronomy 28:12", text:"The LORD will open to you His good treasure, the heavens, to give the rain to your land in its season, and to bless all the work of your hand. You shall lend to many nations, but you shall not borrow.", cat:"Breakthrough" },
  { ref:"Isaiah 60:5", text:"Then you shall see and become radiant, and your heart shall swell with joy; because the abundance of the sea shall be turned to you, the wealth of the Gentiles shall come to you.", cat:"Breakthrough" },
  { ref:"Proverbs 13:22", text:"A good man leaves an inheritance to his children's children, but the wealth of the sinner is stored up for the righteous.", cat:"Breakthrough" },
  { ref:"Ecclesiastes 2:26", text:"For God gives wisdom and knowledge and joy to a man who is good in His sight; but to the sinner He gives the work of gathering and collecting, that he may give to him who is good before God.", cat:"Breakthrough" },
  { ref:"Haggai 2:8", text:"'The silver is Mine, and the gold is Mine,' says the LORD of hosts.", cat:"Breakthrough" },
];
const BASE_CATS = ["Prosperity","Tithing & Giving","Wisdom","Provision","Breakthrough"];

// APP STATE
let currentUser = null;
let cloudFavs = [];
let cloudVerses = [];
let cloudCats = [];
let isDark = localStorage.getItem("seed_dark") === "true";
let searchVisible = false, searchQuery = "", selectedCat = "All", currentView = "daily";
let authMode = "login"; // or "signup"

if (isDark) document.body.classList.add("dark");

// HELPERS
function getVerses() { return [...BASE_VERSES, ...cloudVerses]; }
function getCategories() { return ["All", ...BASE_CATS, ...cloudCats]; }
function isFav(ref) { return cloudFavs.includes(ref); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove("show"), 2400);
}

// DAILY VERSE
function getDailyVerse() {
  const verses = getVerses();
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  const seed = (now.getFullYear() * 1000) + dayOfYear;
  return verses[seed % verses.length];
}

// CLOUD OPS
async function loadUserData() {
  const [favRes, verseRes, catRes] = await Promise.all([
    db.from("favorites").select("verse_ref"),
    db.from("custom_verses").select("*").order("created_at"),
    db.from("custom_categories").select("name").order("created_at"),
  ]);
  cloudFavs = (favRes.data || []).map(r => r.verse_ref);
  cloudVerses = (verseRes.data || []).map(r => ({ ref: r.ref, text: r.text, cat: r.cat }));
  cloudCats = (catRes.data || []).map(r => r.name);
}

async function toggleFav(ref) {
  if (isFav(ref)) {
    cloudFavs = cloudFavs.filter(r => r !== ref);
    await db.from("favorites").delete().eq("verse_ref", ref).eq("user_id", currentUser.id);
    showToast("Removed from Favorites");
  } else {
    cloudFavs.push(ref);
    await db.from("favorites").insert({ user_id: currentUser.id, verse_ref: ref });
    showToast("Added to Favorites");
  }
  render();
}

async function toggleFlashFav() {
  const v = getDailyVerse();
  await toggleFav(v.ref);
  renderFlash();
}

function renderFlash() {
  const v = getDailyVerse();
  const card = document.getElementById("flashcard");
  const favBtn = document.getElementById("fcFav");
  if (!card) return;
  card.innerHTML = `<div class="flashcard-ornament">&#10022;</div><div class="flashcard-cat">${v.cat}</div><div class="flashcard-text">"${v.text}"</div><div class="flashcard-ref">${v.ref} &middot; NKJV</div>`;
  if (favBtn) { favBtn.className = "fc-fav" + (isFav(v.ref) ? " active" : ""); favBtn.innerHTML = isFav(v.ref) ? "&#9829;" : "&#9825;"; }
}

// VERSE CARD
function renderVerseCard(v) {
  const sr = v.ref.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
  return `<div class="verse-card"><div class="verse-ref"><span>${v.ref} &middot; NKJV</span><span class="verse-category-tag">${v.cat}</span></div><div class="verse-text">"${v.text}"</div><div class="verse-actions"><button class="fav-btn ${isFav(v.ref) ? "active" : ""}" onclick="toggleFav('${sr}')">${isFav(v.ref) ? "&#9829;" : "&#9825;"}</button></div></div>`;
}

function getFilteredVerses() {
  let list = getVerses();
  if (currentView === "favorites") list = list.filter(v => isFav(v.ref));
  if (currentView === "browse" && selectedCat !== "All") list = list.filter(v => v.cat === selectedCat);
  if (searchQuery) { const q = searchQuery.toLowerCase(); list = list.filter(v => v.ref.toLowerCase().includes(q) || v.text.toLowerCase().includes(q) || v.cat.toLowerCase().includes(q)); }
  return list;
}

// MAIN RENDER
function render() {
  const main = document.getElementById("mainContent");
  if (!currentUser) { renderAuth(); return; }

  if (currentView === "daily") {
    const now = new Date();
    const dateStr = now.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
    main.innerHTML = `<div class="flashcard-section"><div class="flashcard-label">Verse of the Day &middot; ${dateStr}</div><div class="flashcard-wrap"><div class="flashcard" id="flashcard"></div></div><div class="flashcard-controls"><button class="fc-fav" id="fcFav" onclick="toggleFlashFav()" title="Add to Favorites">&#9825;</button></div></div>`;
    renderFlash(); return;
  }

  let html = ""; const list = getFilteredVerses();
  if (currentView === "browse") {
    html += `<div class="category-chips">`;
    getCategories().forEach(cat => { html += `<button class="chip ${selectedCat === cat ? "active" : ""}" onclick="selectCat('${cat.replace(/'/g, "\\'")}')">${cat}</button>`; });
    html += `</div>`;
    html += `<div class="section-label">${selectedCat === "All" ? "All Categories" : selectedCat} &middot; ${list.length} verse${list.length !== 1 ? "s" : ""}</div>`;
  }
  if (currentView === "all") html += `<div class="section-label">All ${list.length} Verses &middot; NKJV</div>`;
  if (currentView === "favorites") html += `<div class="section-label">Your Favorites &middot; ${list.length} verse${list.length !== 1 ? "s" : ""}</div>`;
  if (list.length === 0) { html += currentView === "favorites" ? `<div class="empty">No favorites yet. Tap &#9825; on any verse to save it here.</div>` : `<div class="empty">No verses found.</div>`; }
  else { html += `<div class="verse-grid">`; list.forEach(v => { html += renderVerseCard(v); }); html += `</div>`; }
  main.innerHTML = html;
}

function selectCat(cat) { selectedCat = cat; render(); }

// AUTH SCREEN
function renderAuth() {
  const main = document.getElementById("mainContent");
  const isLogin = authMode === "login";
  main.innerHTML = `
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-title">${isLogin ? "Welcome back" : "Create your account"}</div>
        <div class="auth-subtitle">${isLogin ? "Sign in to access your saved verses and favorites." : "Sign up to save your verses and favorites to the cloud."}</div>
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
        <label class="auth-label">Password</label>
        <input class="auth-input" type="password" id="authPassword" placeholder="${isLogin ? "Your password" : "Choose a password (min 6 characters)"}" autocomplete="${isLogin ? "current-password" : "new-password"}">
        <div id="authMsg"></div>
        <button class="auth-btn" id="authSubmit" onclick="handleAuth()">${isLogin ? "Sign In" : "Sign Up"}</button>
        <div class="auth-switch">
          ${isLogin ? "Don't have an account? <a onclick=\"switchAuth('signup')\">Sign up</a>" : "Already have an account? <a onclick=\"switchAuth('login')\">Sign in</a>"}
        </div>
      </div>
    </div>`;
  setTimeout(() => { const e = document.getElementById("authEmail"); if (e) e.focus(); }, 100);
}

function switchAuth(mode) { authMode = mode; render(); }

async function handleAuth() {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value;
  const btn = document.getElementById("authSubmit");
  const msg = document.getElementById("authMsg");
  if (!email || !password) { msg.innerHTML = `<div class="auth-error">Please enter your email and password.</div>`; return; }
  btn.disabled = true; btn.textContent = authMode === "login" ? "Signing in..." : "Creating account...";
  msg.innerHTML = "";
  let result;
  if (authMode === "login") {
    result = await db.auth.signInWithPassword({ email, password });
  } else {
    result = await db.auth.signUp({ email, password });
  }
  if (result.error) {
    msg.innerHTML = `<div class="auth-error">${result.error.message}</div>`;
    btn.disabled = false; btn.textContent = authMode === "login" ? "Sign In" : "Sign Up";
  } else if (authMode === "signup" && !result.data.session) {
    msg.innerHTML = `<div class="auth-success">Check your email to confirm your account, then sign in.</div>`;
    btn.disabled = false; btn.textContent = "Sign Up";
  }
}

async function signOut() {
  await db.auth.signOut();
  currentUser = null; cloudFavs = []; cloudVerses = []; cloudCats = [];
  document.getElementById("userPill").style.display = "none";
  document.getElementById("signOutBtn").style.display = "none";
  document.getElementById("addBtn").style.display = "none";
  render();
}

// ADD VERSE MODAL
function openModal() { populateCatSelect(); document.getElementById("newRef").value = ""; document.getElementById("newText").value = ""; document.getElementById("newCatInput").value = ""; document.getElementById("modalOverlay").style.display = "flex"; }
function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }
function populateCatSelect() { const sel = document.getElementById("newCat"); sel.innerHTML = ""; [...BASE_CATS, ...cloudCats].forEach(cat => { const opt = document.createElement("option"); opt.value = cat; opt.textContent = cat; sel.appendChild(opt); }); }

async function addCategory() {
  const input = document.getElementById("newCatInput");
  const name = input.value.trim();
  if (!name) return showToast("Please enter a category name.");
  if ([...BASE_CATS, ...cloudCats].map(c => c.toLowerCase()).includes(name.toLowerCase())) return showToast("That category already exists.");
  const { error } = await db.from("custom_categories").insert({ user_id: currentUser.id, name });
  if (error) return showToast("Error saving category.");
  cloudCats.push(name); input.value = ""; populateCatSelect();
  document.getElementById("newCat").value = name;
  showToast(`Category "${name}" added.`);
}

async function saveVerse() {
  const ref = document.getElementById("newRef").value.trim();
  const text = document.getElementById("newText").value.trim();
  const cat = document.getElementById("newCat").value;
  if (!ref) return showToast("Please enter a verse reference.");
  if (!text) return showToast("Please enter the verse text.");
  if (getVerses().find(v => v.ref.toLowerCase() === ref.toLowerCase())) return showToast("That reference already exists.");
  const { error } = await db.from("custom_verses").insert({ user_id: currentUser.id, ref, text, cat });
  if (error) return showToast("Error saving verse.");
  cloudVerses.push({ ref, text, cat }); closeModal();
  showToast(`"${ref}" added to ${cat}.`); render();
}

// EVENTS
document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target === document.getElementById("modalOverlay")) closeModal(); });
document.querySelectorAll(".tab").forEach(tab => { tab.addEventListener("click", () => { document.querySelectorAll(".tab").forEach(t => t.classList.remove("active")); tab.classList.add("active"); currentView = tab.dataset.view; searchQuery = ""; document.getElementById("searchInput").value = ""; render(); }); });
document.getElementById("searchToggle").addEventListener("click", () => { searchVisible = !searchVisible; document.getElementById("searchBar").style.display = searchVisible ? "block" : "none"; document.getElementById("searchToggle").classList.toggle("active", searchVisible); if (searchVisible) document.getElementById("searchInput").focus(); });
document.getElementById("searchInput").addEventListener("input", e => { searchQuery = e.target.value; if (searchQuery && currentView === "daily") { currentView = "all"; document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === "all")); } render(); });
document.getElementById("darkToggle").addEventListener("click", () => { isDark = !isDark; document.body.classList.toggle("dark", isDark); localStorage.setItem("seed_dark", isDark); document.getElementById("darkToggle").textContent = isDark ? "☀️" : "🌙"; });
if (isDark) document.getElementById("darkToggle").textContent = "☀️";
document.getElementById("addBtn").addEventListener("click", openModal);
document.getElementById("signOutBtn").addEventListener("click", signOut);

// ONE-TIME MIGRATION from localStorage to Supabase
async function migrateFromLocalStorage(userId) {
  const migrated = localStorage.getItem("seed_migrated");
  if (migrated) return; // already done

  let didMigrate = false;

  // Migrate favorites
  const oldFavs = JSON.parse(localStorage.getItem("seed_favs") || "[]");
  if (oldFavs.length > 0) {
    // Only insert refs not already in cloud
    const newFavs = oldFavs.filter(ref => !cloudFavs.includes(ref));
    if (newFavs.length > 0) {
      const rows = newFavs.map(ref => ({ user_id: userId, verse_ref: ref }));
      await db.from("favorites").upsert(rows, { onConflict: "user_id,verse_ref" });
      cloudFavs = [...cloudFavs, ...newFavs];
      didMigrate = true;
    }
  }

  // Migrate custom verses
  const oldVerses = JSON.parse(localStorage.getItem("seed_custom_verses") || "[]");
  if (oldVerses.length > 0) {
    const existingRefs = cloudVerses.map(v => v.ref.toLowerCase());
    const newVerses = oldVerses.filter(v => !existingRefs.includes(v.ref.toLowerCase()));
    if (newVerses.length > 0) {
      const rows = newVerses.map(v => ({ user_id: userId, ref: v.ref, text: v.text, cat: v.cat }));
      await db.from("custom_verses").insert(rows);
      cloudVerses = [...cloudVerses, ...newVerses];
      didMigrate = true;
    }
  }

  // Migrate custom categories
  const oldCats = JSON.parse(localStorage.getItem("seed_custom_cats") || "[]");
  if (oldCats.length > 0) {
    const existingCats = cloudCats.map(c => c.toLowerCase());
    const newCats = oldCats.filter(c => !existingCats.includes(c.toLowerCase()));
    if (newCats.length > 0) {
      const rows = newCats.map(name => ({ user_id: userId, name }));
      await db.from("custom_categories").upsert(rows, { onConflict: "user_id,name" });
      cloudCats = [...cloudCats, ...newCats];
      didMigrate = true;
    }
  }

  // Mark migration done and clear old localStorage data
  localStorage.setItem("seed_migrated", "true");
  localStorage.removeItem("seed_favs");
  localStorage.removeItem("seed_custom_verses");
  localStorage.removeItem("seed_custom_cats");
  localStorage.removeItem("seed_flash_date");
  localStorage.removeItem("seed_flash_order");
  localStorage.removeItem("seed_flash_idx");

  if (didMigrate) showToast("Your saved verses and favorites have been moved to the cloud.");
}

// AUTH STATE LISTENER
db.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    currentUser = session.user;
    document.getElementById("mainContent").innerHTML = `<div class="loading"><div class="spinner"></div><br>Loading your verses...</div>`;
    await loadUserData();
    await migrateFromLocalStorage(currentUser.id);
    const pill = document.getElementById("userPill");
    pill.textContent = currentUser.email.split("@")[0];
    pill.style.display = "inline-block";
    document.getElementById("signOutBtn").style.display = "flex";
    document.getElementById("addBtn").style.display = "flex";
  } else {
    currentUser = null;
  }
  render();
});

// SERVICE WORKER
if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(e => console.log("SW failed", e)); }); }
</script>
